<!DOCTYPE html>
<html lang="de"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fishing Tracker Fanghistorie</title>
<style>
html,body{margin:0;min-height:100%;background:#071018;color:white;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.wrap{min-height:100vh;padding:12px;box-sizing:border-box;background:radial-gradient(circle at 100% 0%,rgba(0,140,255,.18),transparent 34%),linear-gradient(145deg,#081018,#030507)}
.header{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}.title{font-size:22px;font-weight:850}.pill{font-size:12px;opacity:.8;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);white-space:nowrap}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}select{width:100%;border:0;border-radius:14px;background:rgba(255,255,255,.07);color:white;padding:10px;outline:none}option{color:black}
.entry{margin-bottom:10px;padding:14px;border-radius:20px;background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.035));box-shadow:inset 0 0 0 1px rgba(255,255,255,.035)}
.entry.good{box-shadow:inset 0 0 0 1px rgba(0,255,120,.12),0 0 18px rgba(0,255,120,.06)}.entry.bad{box-shadow:inset 0 0 0 1px rgba(255,60,60,.12),0 0 18px rgba(255,60,60,.05)}
.top{display:flex;justify-content:space-between;gap:8px;align-items:center}.main{font-size:18px;font-weight:850}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.good .badge{background:rgba(0,255,120,.15);color:#78ffb0}.bad .badge{background:rgba(255,60,60,.15);color:#ff8c8c}
.sub{margin-top:8px;color:rgba(255,255,255,.72);font-size:14px;line-height:1.45}.meta{margin-top:8px;color:rgba(255,255,255,.46);font-size:12px}.empty{padding:18px;border-radius:20px;background:rgba(255,255,255,.055);color:rgba(255,255,255,.75)}
</style></head><body><div class="wrap"><div class="header"><div class="title">📋 Fanghistorie</div><div class="pill" id="count">Lade…</div></div>
<div class="filters"><select id="fish"><option value="">Alle Fischarten</option></select><select id="spot"><option value="">Alle Spots</option></select><select id="bait"><option value="">Alle Köder</option></select><select id="status"><option value="">Alle Sessions</option><option value="1">Nur Fang</option><option value="0">Nur kein Fang</option></select></div><div id="list"></div></div>
<script>
const DATA_URL="/local/fishing_tracker_data.json";let allEntries=[];
function fixText(v){return typeof v==="string"?v.replaceAll("ÃŸ","ß").replaceAll("Ã¤","ä").replaceAll("Ã¶","ö").replaceAll("Ã¼","ü").replaceAll("Ã„","Ä").replaceAll("Ã–","Ö").replaceAll("Ãœ","Ü"):v}
function norm(e){return{timestamp:e.timestamp||e.time||"",angler:fixText(e.angler||"Fishing Tracker"),fish_type:fixText(e.fish_type||e.fischart||e.fish||"-"),caught:Number(e.caught||e.fang||0),spot:fixText(e.spot||"-"),bait:fixText(e.bait||e.koeder||"-"),length_cm:e.length_cm??e.laenge??0,chance:e.chance??"-",temperature:e.temperature??"-",latitude:e.latitude??e.lat??null,longitude:e.longitude??e.lon??e.lng??null}}
function unique(a){return[...new Set(a.filter(v=>v&&v!=="-"))].sort((a,b)=>String(a).localeCompare(String(b),"de"))}
function fill(id,values){const el=document.getElementById(id),first=el.options[0].outerHTML;el.innerHTML=first+values.map(v=>`<option value="${String(v).replaceAll('"','&quot;')}">${v}</option>`).join("")}
function rows(){const fish=document.getElementById("fish").value,spot=document.getElementById("spot").value,bait=document.getElementById("bait").value,status=document.getElementById("status").value;return allEntries.filter(e=>(!fish||e.fish_type===fish)&&(!spot||e.spot===spot)&&(!bait||e.bait===bait)&&(!status||String(e.caught)===status))}
function fmt(v){try{return new Date(v).toLocaleString("de-DE",{dateStyle:"short",timeStyle:"short"})}catch{return v||""}}
function render(){const r=rows().slice().reverse();document.getElementById("count").textContent=`${r.length} Einträge`;const list=document.getElementById("list");if(!r.length){list.innerHTML=`<div class="empty">Keine passenden Einträge gefunden.</div>`;return}list.innerHTML=r.map(e=>{const good=e.caught>=1,gps=e.latitude&&e.longitude?" · GPS ✓":"";return `<div class="entry ${good?"good":"bad"}"><div class="top"><div class="main">${e.fish_type} · ${e.spot}</div><div class="badge">${good?"FANG":"KEIN FANG"}</div></div><div class="sub">Köder: <b>${e.bait}</b> · Länge: <b>${e.length_cm||0} cm</b><br>Chance: <b>${e.chance} %</b> · Temperatur: <b>${e.temperature} °C</b>${gps}</div><div class="meta">${fmt(e.timestamp)}</div></div>`}).join("")}
async function load(){try{const r=await fetch(DATA_URL+"?ts="+Date.now(),{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);const p=await r.json();allEntries=(Array.isArray(p)?p:(p.entries||[])).map(norm);fill("fish",unique(allEntries.map(e=>e.fish_type)));fill("spot",unique(allEntries.map(e=>e.spot)));fill("bait",unique(allEntries.map(e=>e.bait)));render()}catch(e){document.getElementById("count").textContent="Keine Daten";document.getElementById("list").innerHTML=`<div class="empty">fishing_tracker_data.json konnte nicht geladen werden.</div>`;console.error(e)}}
document.addEventListener("DOMContentLoaded",()=>{["fish","spot","bait","status"].forEach(id=>document.getElementById(id).addEventListener("change",render));load()});
</script></body></html>
