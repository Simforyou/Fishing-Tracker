<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>

<title>Fishing Tracker</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  /* Top-Bar */
  .ft-topbar{
    height:56px;background:linear-gradient(90deg,#07111d,#0d1a2a);

  /* Nav Tabs */
  .ft-nav{
    background:#06101a;border-bottom:1px solid rgba(255,255,255,.06);

<body>
<div id="ft-root">

      <div class="dot"></div>

<script>
// ── Clock ──────────────────────────────────────────────────────────────────────
setInterval(() => {
  const t = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock').textContent = t + ' Uhr';
}, 1000);

// ── Connect to HA via parent window ───────────────────────────────────────────
let haConnection = null;
let haStates = {};
let currentView = 'overview';

// Try to get HA connection from parent
async function connectHA() {
  try {
    // HA iframe: parent has hassConnection
    if (window.parent && window.parent.customElements) {
      const haEl = window.parent.document.querySelector('home-assistant');
      if (haEl && haEl.hass) {
        haStates = haEl.hass.states || {};
        return true;
      }
    }
  } catch(e) {}
  return false;
}

function getState(entityId, fallback = '--') {
  const s = haStates[entityId];
  return s ? s.state : fallback;
}

function getAttr(entityId, attr, fallback = '--') {
  const s = haStates[entityId];
  return s && s.attributes ? (s.attributes[attr] ?? fallback) : fallback;
}

// ── Navigation ────────────────────────────────────────────────────────────────
const VIEWS = [
  ['overview', '🏠', 'Übersicht'],
  ['forecast', '📈', 'Prognosen'],
  ['species',  '🎯', 'Zielfische'],
  ['spots',    '📍', 'Spots'],
  ['logbook',  '📘', 'Fangbuch'],
  ['stats',    '📊', 'Statistiken'],
  ['bait',     '🪱', 'Köder-Wizard'],
  ['weather',  '🌦️', 'Wetter'],
  ['settings', '⚙️', 'Einstellungen'],
];

function buildNav() {
  document.getElementById('nav').innerHTML = VIEWS.map(([v, i, l]) =>
    `<button class="ft-nav-btn ${v === currentView ? 'active' : ''}"
      onclick="switchView('${v}')">${i} ${l}</button>`
  ).join('');
}

function switchView(v) {
  currentView = v;
  buildNav();
  renderView();
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function drawChart(id, pts, color = '#ff9d18') {
  const svg = document.getElementById(id);
  if (!svg) return;
  const w = 900, h = 180, pad = 28, step = (w - pad * 2) / (pts.length - 1);
  const mx = Math.max(...pts) || 100;
  const pp = pts.map((v, i) => [pad + i * step, h - pad - (v / mx) * (h - pad * 1.6)]);
  const line = pp.map((p, i) => (i ? 'L' : 'M') + p[0] + ',' + p[1]).join(' ');
  const area = 'M' + pp[0][0] + ',' + (h - pad) + ' ' + pp.map(p => 'L' + p[0] + ',' + p[1]).join(' ') + ' L' + pp[pp.length-1][0] + ',' + (h-pad) + ' Z';
  const nh = new Date().getHours();
  const nx = pad + Math.min(nh, pts.length-1) * step;
  const ny = pp[Math.min(nh, pts.length-1)]?.[1] || 60;
  const labs = pts.length > 8 ? ['00','03','06','09','12','15','18','21'] : ['Mo','Di','Mi','Do','Fr','Sa','So'];
  svg.innerHTML = `
    <defs><linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity=".03"/>
    </linearGradient></defs>
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="rgba(255,255,255,.1)"/>
    ${labs.map((l,i) => `<text x="${pad + i*(w-pad*2)/(labs.length-1) - 10}" y="${h-4}" fill="rgba(255,255,255,.4)" font-size="11" font-family="system-ui">${l}</text>`).join('')}
    <path d="${area}" fill="url(#g${id})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="${nx}" y1="${pad}" x2="${nx}" y2="${h-pad}" stroke="rgba(255,215,0,.55)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="${nx}" cy="${ny}" r="5" fill="#ffd23f" stroke="#fff" stroke-width="1.5"/>
    <text x="${nx+7}" y="${ny-7}" fill="#ffd23f" font-size="11" font-weight="800" font-family="system-ui">Jetzt</text>`;
}

function baitCard(name, sub) {
  const key = name.replace(/ \d+.*cm$/,'').replace(/ \(.*\)$/,'').replace('Gummifisch 7–12cm','Gummifisch').replace('Gummifisch 5–8cm','Gummifisch');

        <div class="sec">☀️ 7-Tage Vorschau</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
          ${[['Fr','⛅',18,11],['Sa','🌤️',20,13],['So','🌧️',17,11],['Mo','⛅',19,12],['Di','☀️',21,14],['Mi','🌤️',18,11],['Do','⛅',16,10]].map(([d,i,h,l])=>`<div style="text-align:center;padding:8px 2px"><div style="font-size:10px;color:var(--muted)">${d}</div><div style="font-size:20px;margin:5px 0">${i}</div><div style="font-size:13px;font-weight:800">${h}°</div><div style="font-size:11px;color:var(--muted)">${l}°</div></div>`).join('')}
        </div>
      </div>`,

    settings: () => `
      <div class="panel">
        <div class="sec">⚙️ Einstellungen</div>
        ${[['Weather Entity','weather.home'],['Wassertemp. URL','wassertemperatur.site'],['Pegelstation','Pegelonline WSV'],['Version','v2.12.3'],['Sensoren','22 aktiv']].map(([l,v])=>`<div class="set-row"><span>${l}</span><code class="set-code">${v}</code></div>`).join('')}
        <div class="sec" style="margin-top:16px">Benachrichtigungen</div>
        ${[['Beste Zeiten täglich',true],['Wetterwarnungen',true],['Fang-Erinnerungen',false]].map(([l,v])=>`<div class="set-row"><span>${l}</span><span style="color:${v?'#67d33f':'#ff6b6b'}">${v?'✅ Aktiv':'❌ Aus'}</span></div>`).join('')}
      </div>`,
  };

  const html = `<style>${STYLES}</style>` + ((views[currentView] || views.overview)() || '');
  document.getElementById('content').innerHTML = html;

  // Add tab click handlers
  document.querySelectorAll('.fc-tab').forEach(t => {
    t.onclick = () => { document.querySelectorAll('.fc-tab').forEach(x => x.classList.remove('active')); t.classList.add('active'); };
  });

  // Draw charts after render
  setTimeout(() => {
    drawChart('dayChart', DAY, '#ff9d18');
    drawChart('weekChart', WEEK, '#2ea8ff');
    drawChart('specChart', SPECIES_CURVES[selFish] || DAY, '#67d33f');
  }, 50);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await connectHA();
  buildNav();
  renderView();
  // Refresh HA states every 30s
  setInterval(async () => {
    await connectHA();
    renderView();
  }, 30000);
}

init();
</script>
</body>
</html>
