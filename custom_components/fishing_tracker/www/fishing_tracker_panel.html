<script>
// ── Clock ──────────────────────────────────────────────────────────────────────
setInterval(() => {
  const t = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock').textContent = t + ' Uhr';
}, 1000);

// ── Connect to HA via parent window ───────────────────────────────────────────
let haConnection = null;
let haStates = {};
let currentView = 'overview';

// Try to get HA connection from parent
async function connectHA() {
  try {
    // HA iframe: parent has hassConnection
    if (window.parent && window.parent.customElements) {
      const haEl = window.parent.document.querySelector('home-assistant');
      if (haEl && haEl.hass) {
        haStates = haEl.hass.states || {};
        return true;
      }
    }
  } catch(e) {}
  return false;
}

function getState(entityId, fallback = '--') {
  const s = haStates[entityId];
  return s ? s.state : fallback;
}

function getAttr(entityId, attr, fallback = '--') {
  const s = haStates[entityId];
  return s && s.attributes ? (s.attributes[attr] ?? fallback) : fallback;
}

// ── Navigation ────────────────────────────────────────────────────────────────
const VIEWS = [
  ['overview', '🏠', 'Übersicht'],
  ['forecast', '📈', 'Prognosen'],
  ['species',  '🎯', 'Zielfische'],
  ['spots',    '📍', 'Spots'],
  ['logbook',  '📘', 'Fangbuch'],
  ['stats',    '📊', 'Statistiken'],
  ['bait',     '🪱', 'Köder-Wizard'],
  ['weather',  '🌦️', 'Wetter'],
  ['settings', '⚙️', 'Einstellungen'],
];

function buildNav() {
  document.getElementById('nav').innerHTML = VIEWS.map(([v, i, l]) =>
    `<button class="ft-nav-btn ${v === currentView ? 'active' : ''}"
      onclick="switchView('${v}')">${i} ${l}</button>`
  ).join('');
}

function switchView(v) {
  currentView = v;
  buildNav();
  renderView();
  // Prognosen-View: sofort Content laden
  // Forecast wird direkt in der view-Funktion gerendert
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function smooth(pp) {
  if (pp.length < 2) return pp.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ');
  let d = 'M'+pp[0][0]+','+pp[0][1];
  for (let i=0; i<pp.length-1; i++) {
    const t = 0.25;
    const cp1x = pp[i][0]+(pp[i+1][0]-pp[i][0])*t;
    const cp2x = pp[i+1][0]-(pp[i+1][0]-pp[i][0])*t;
    d += ' C'+cp1x+','+pp[i][1]+' '+cp2x+','+pp[i+1][1]+' '+pp[i+1][0]+','+pp[i+1][1];
  }
  return d;
}

function drawChart(id, pts, color = '#ff9d18', todayIdx = null) {
  const svg = document.getElementById(id);
  if (!svg) return;
  // Feste Dimensionen mit Y-Achse links
  const w=900, h=220, padL=38, padR=10, padT=16, padB=24;
  const step = (w - padL - padR) / (pts.length - 1);
  // FIXE Y-Achse 0-100% – kein Auto-Scale!
  const pp = pts.map((v,i) => [padL + i*step, padT + (1 - v/100) * (h - padT - padB)]);
  // Bezier smooth
  let smoothPath = 'M'+pp[0][0]+','+pp[0][1];
  for (let i=0; i<pp.length-1; i++) {
    // Tension 0.25: glatt aber nah an Datenpunkten → kein Schweben
    const tension = 0.25;
    const cx1=pp[i][0]+(pp[i+1][0]-pp[i][0])*tension;
    const cx2=pp[i+1][0]-(pp[i+1][0]-pp[i][0])*tension;
    smoothPath += ` C${cx1},${pp[i][1]} ${cx2},${pp[i+1][1]} ${pp[i+1][0]},${pp[i+1][1]}`;
  }
  const area = `M${pp[0][0]},${h-padB} ${smoothPath.slice(1)} L${pp[pp.length-1][0]},${h-padB} Z`;
  const nh = new Date().getHours();
  // Wochenchart: todayIdx nutzen; Tages-Chart: aktuelle Stunde
  const ni = (todayIdx !== null) ? Math.min(todayIdx, pts.length-1) : Math.min(nh, pts.length-1);
  const nx = pp[ni][0], ny = pp[ni][1];
  const labs = pts.length > 8 ? ['00','03','06','09','12','15','18','21'] : ['Mo','Di','Mi','Do','Fr','Sa','So'];
  // Y-Achse: 0/25/50/75/100%
  const yLines = [100,75,50,25,0].map(pct => {
    const y = padT + (1-pct/100)*(h-padT-padB);
    return `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(255,255,255,${pct===50?'.12':'.06'})"/>
            <text x="${padL-3}" y="${y+4}" fill="rgba(255,255,255,.35)" font-size="9" text-anchor="end" font-family="system-ui">${pct}</text>`;
  }).join('');
  svg.innerHTML = `
    <defs><linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".22"/>
      <stop offset="100%" stop-color="${color}" stop-opacity=".02"/>
    </linearGradient></defs>
    ${yLines}
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="rgba(255,255,255,.15)"/>
    ${labs.map((l,i)=>`<text x="${padL+i*(w-padL-padR)/(labs.length-1)}" y="${h-5}" fill="rgba(255,255,255,.4)" font-size="10" text-anchor="middle" font-family="system-ui">${l}</text>`).join('')}
    <path d="${area}" fill="url(#g${id})"/>
    <path d="${smoothPath}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="${nx}" y1="${padT+18}" x2="${nx}" y2="${h-padB}" stroke="rgba(255,215,0,.6)" stroke-width="2" stroke-dasharray="5 3"/>
    <rect x="${nx-18}" y="${padT+2}" width="36" height="16" rx="4" fill="rgba(255,215,0,.15)" stroke="rgba(255,215,0,.5)" stroke-width="1"/>
    <text x="${nx}" y="${padT+13}" fill="#ffd23f" font-size="10" font-weight="800" text-anchor="middle" font-family="system-ui">Jetzt</text>`;
}

// ── Einheitliche Datenbasis: DAY + WEEK aus HA-Sensoren ─────────────────────
// DAY: 24 Stundenwerte – Backend-Sensor + stündliche Wettermodulation
const _dayForecastAttr = haStates['sensor.fishing_tracker_bite_forecast_day']?.attributes;
const _hourlyFc = haStates['weather.home']?.attributes?.forecast || [];

// Stündliche Wettermodifikatoren berechnen
const _hourlyMod = new Array(24).fill(0);
_hourlyFc.forEach(fc => {
  try {
    const h = new Date(fc.datetime).getHours();
    let mod = 0;
    const rain = parseFloat(fc.precipitation || 0);
    const rainProb = parseFloat(fc.precipitation_probability || 0);
    const wind = parseFloat(fc.wind_speed || 0);
    const temp = parseFloat(fc.temperature || 12);
    // Regen: leichter Regen gut (+3), starker Regen schlecht (-8)
    if (rain > 5) mod -= 8;
    else if (rain > 2) mod -= 4;
    else if (rain > 0.5) mod += 3;
    // Hohe Regenwahrscheinlichkeit
    if (rainProb > 80) mod -= 5;
    else if (rainProb > 60) mod -= 2;
    // Starker Wind
    if (wind > 30) mod -= 8;
    else if (wind > 20) mod -= 3;
    // Temperatur
    if (temp < 3) mod -= 5;
    else if (temp > 25) mod -= 3;
    _hourlyMod[h] = mod;
  } catch(e) {}
});

const DAY = (() => {
  if (_dayForecastAttr?.points?.length >= 20) {
    const pts = new Array(24).fill(50);
    _dayForecastAttr.points.forEach(p => {
      try {
        const h = new Date(p.timestamp).getHours();
        // Backend-Score + stündliche Wettermodulation
        const raw = Math.round(p.score) + _hourlyMod[h];
        pts[h] = Math.min(95, Math.max(5, raw));
      } catch(e){}
    });
    return pts;
  }
  // Fallback: Demo mit Wettermodulation
  const base = [28,25,32,30,28,26,25,42,60,68,72,70,65,60,55,52,58,68,88,92,85,72,58,42];
  return base.map((v,h) => Math.min(95, Math.max(5, v + _hourlyMod[h])));
})();

  if (_weekForecastAttr?.length >= 7) {
    return _weekForecastAttr.slice(0,7).map(d => ({
      d: d.weekday, date: d.date_str, v: Math.round(d.avg_score), isToday: d.is_today
    }));
  }
  // Fallback: Mo-So ab aktuellem Montag
  const days = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const vals = [72,65,58,71,68,74,62];
  const todayDow = new Date().getDay();
  const moOff = todayDow===0?6:todayDow-1;
  return days.map((d,i) => ({
    d, v: vals[i], isToday: i===moOff,
    date: (() => { const dt=new Date(); dt.setDate(dt.getDate()-moOff+i); return dt.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); })()
  }));
})();

function baitCard(name, sub) {
  const key = BAIT_ALIAS[name] || name.replace(/ \d+.*cm$/,'').replace(/ \(.*\)$/,'');
  const icon = BAIT_ICONS[key] || BAIT_ICONS['Gummifisch'];
  return `<div class="bait-card"><div class="bait-icon">${icon}</div><div><div class="bait-name">${name}</div><div class="bait-sub">${sub||key}</div></div></div>`;
}

    if (condition.includes('sunny') || condition.includes('clear')) mod += 3;
    if (condition.includes('storm') || condition.includes('thunder')) mod -= 15;
    if (condition.includes('fog')) mod -= 4;
    if (condition.includes('cloudy') && !condition.includes('partly')) mod += 2;

    // Nur für erste 7 Tage: WEEK-Werte nutzen wenn vorhanden
    if (i < WEEK.length && WEEK[i]) {
      // Mix: 70% Sensor, 30% Wetterberechnung
      base = Math.round(WEEK[i] * 0.7 + (65 + mod) * 0.3);
    } else {
      base = Math.round(65 + mod);
    }

    return Math.min(95, Math.max(15, base));
  });
})();

function drawPressureChart(id, pastPts, futurePts, base) {
  const svg = document.getElementById(id);
  if (!svg) return;
  const w=900, h=130, padL=52, padR=16, padT=10, padB=24;
  const allPts = [...pastPts, ...futurePts];
  const minV = Math.min(...allPts)-3, maxV = Math.max(...allPts)+3;
  const range = maxV - minV || 10;
  const totalPts = pastPts.length + futurePts.length;
  const step = (w-padL-padR)/(totalPts-1);
  
  function toXY(val, idx) {
    return [
      padL + idx*step,
      padT + (1-(val-minV)/range)*(h-padT-padB)
    ];
  }
  
  const pastCoords = pastPts.map((v,i) => toXY(v,i));
  const futureCoords = futurePts.map((v,i) => toXY(v, pastPts.length-1+i));
  
  // Bezier smooth
  function bezier(coords) {
    if (!coords.length) return '';
    let d = 'M'+coords[0][0]+','+coords[0][1];
    for (let i=0; i<coords.length-1; i++) {
      const cp1x = coords[i][0]+(coords[i+1][0]-coords[i][0])*0.4;
      const cp2x = coords[i+1][0]-(coords[i+1][0]-coords[i][0])*0.4;
      d += ' C'+cp1x+','+coords[i][1]+' '+cp2x+','+coords[i+1][1]+' '+coords[i+1][0]+','+coords[i+1][1];
    }
    return d;
  }
  
  // Y-Achse Werte (3 Labels)
  const yLabels = [Math.ceil(minV), Math.round((minV+maxV)/2), Math.floor(maxV)];
  
  // Trenn-X (Jetzt)
  const nowX = padL + (pastPts.length-1)*step;
  
  svg.innerHTML = `
    <defs>
      <linearGradient id="pgPast" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2ea8ff" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#2ea8ff" stop-opacity=".03"/>
      </linearGradient>
      <linearGradient id="pgFuture" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffd23f" stop-opacity=".15"/>
        <stop offset="100%" stop-color="#ffd23f" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    <!-- Y-Achse -->
    ${yLabels.map(v => {
      const y = padT + (1-(v-minV)/range)*(h-padT-padB);
      return `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(255,255,255,.06)"/>
              <text x="${padL-4}" y="${y+4}" fill="rgba(255,255,255,.4)" font-size="9" text-anchor="end" font-family="system-ui">${v}</text>`;
    }).join('')}
    <!-- Trennlinie Jetzt -->
    <line x1="${nowX}" y1="${padT}" x2="${nowX}" y2="${h-padB}" stroke="rgba(255,215,0,.4)" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="${nowX+3}" y="${padT+10}" fill="rgba(255,215,0,.7)" font-size="9" font-family="system-ui">Jetzt</text>
    <text x="${padL-4}" y="${h-padB+14}" fill="rgba(255,255,255,.3)" font-size="9" text-anchor="end" font-family="system-ui">hPa</text>
    <!-- Labels -->
    <text x="${padL+20}" y="${h-4}" fill="rgba(255,255,255,.3)" font-size="9" font-family="system-ui">12h ago</text>
    <text x="${w-padR-10}" y="${h-4}" fill="rgba(255,215,0,.5)" font-size="9" text-anchor="end" font-family="system-ui">+12h</text>
    <!-- Vergangenheit Fläche -->
    <path d="M${pastCoords[0][0]},${h-padB} ${bezier(pastCoords).slice(1)} L${pastCoords[pastCoords.length-1][0]},${h-padB} Z" fill="url(#pgPast)"/>
    <!-- Zukunft Fläche -->
    <path d="M${futureCoords[0][0]},${h-padB} ${bezier(futureCoords).slice(1)} L${futureCoords[futureCoords.length-1][0]},${h-padB} Z" fill="url(#pgFuture)"/>
    <!-- Vergangenheit Linie (solide) -->
    <path d="${bezier(pastCoords)}" fill="none" stroke="#2ea8ff" stroke-width="2" stroke-linecap="round"/>
    <!-- Zukunft Linie (gestrichelt) -->
    <path d="${bezier(futureCoords)}" fill="none" stroke="#ffd23f" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4"/>
    <!-- Jetzt-Punkt -->
    <circle cx="${nowX}" cy="${pastCoords[pastCoords.length-1][1]}" r="5" fill="#ffd23f" stroke="#fff" stroke-width="1.5"/>
  `;
}

function addChartTouch(svgId, pts, color) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const w=900, h=200, pad=28;
  const step = (w-pad*2)/(pts.length-1);
  const mx = Math.max(...pts)||100;
  
  function showTooltip(clientX) {
    const rect = svg.getBoundingClientRect();
    const relX = (clientX - rect.left) / rect.width * w;
    const idx = Math.max(0, Math.min(pts.length-1, Math.round((relX-pad)/step)));
    const val = pts[idx];
    const px = pad + idx*step;
    const py = h - pad - (val/mx)*(h-pad*1.6);
    // Korrekte Uhrzeit: 24 Datenpunkte = 1 pro Stunde → idx = Stunde direkt
    const hour = pts.length > 8 ? idx : idx;
    const label = pts.length > 8
      ? `${String(hour).padStart(2,'0')}:00 Uhr – ${val}%`
      : `${['Mo','Di','Mi','Do','Fr','Sa','So'][idx]||'Tag '+(idx+1)} – ${val}%`;
    
    let tip = svg.querySelector('#chartTip');
    if (!tip) {
      tip = document.createElementNS('http://www.w3.org/2000/svg','g');
      tip.id = 'chartTip';
      svg.appendChild(tip);
    }
    // Box-Größe großzügig berechnen
    const bw = Math.max(120, label.length * 8 + 24);
    const bh = 32;
    const bx = Math.min(w - pad - bw - 4, Math.max(pad, px - bw/2));
    const by = py > h/2 ? py - bh - 10 : py + 10;
    tip.innerHTML = `
      <line x1="${px}" y1="${pad}" x2="${px}" y2="${h-pad}" stroke="${color}" stroke-width="1.5" stroke-dasharray="4 3" opacity=".7"/>
      <circle cx="${px}" cy="${py}" r="6" fill="${color}" stroke="#fff" stroke-width="2"/>
      <circle cx="${px}" cy="${py}" r="2.5" fill="#fff"/>
      <rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="8" fill="rgba(8,18,34,.95)" stroke="${color}" stroke-width="1.5"/>
      <text x="${bx+bw/2}" y="${by+bh/2+5}" fill="white" font-size="13" font-weight="900" text-anchor="middle" font-family="system-ui">${label}</text>`;
  }
  
  function removeTooltip() {
    const tip = svg.querySelector('#chartTip');
    if (tip) tip.innerHTML = '';
  }
  
  svg.addEventListener('mousemove', e => showTooltip(e.clientX));
  svg.addEventListener('mouseleave', removeTooltip);
  svg.addEventListener('touchstart', e => { e.preventDefault(); showTooltip(e.touches[0].clientX); }, {passive:false});
  svg.addEventListener('touchmove', e => { e.preventDefault(); showTooltip(e.touches[0].clientX); }, {passive:false});
  svg.addEventListener('touchend', () => setTimeout(removeTooltip, 1500));
  svg.style.cursor = 'crosshair';
}

        L.marker([52.4821, 9.7832], {icon:ic}).addTo(om);
      }

    const rain = parseFloat(fc.precipitation || 0);
    const rainProb = parseFloat(fc.precipitation_probability || 0);
    const wind = parseFloat(fc.wind_speed || 10);
    const condition = (fc.condition || '').toLowerCase();

    let mod = 0;

    // Temperatur
    if (temp < 3) mod -= 10;
    else if (temp < 8) mod -= 5;
    else if (temp >= 12 && temp <= 20) mod += 5;
    else if (temp > 28) mod -= 8;

    // Niederschlag
    if (rain > 8) mod -= 12;
    else if (rain > 3) mod -= 6;
    else if (rain > 0.5 && rain <= 3) mod += 3; // leichter Regen gut
    if (rainProb > 85) mod -= 8;
    else if (rainProb > 60) mod -= 3;

    // Wind
    if (wind > 35) mod -= 12;
    else if (wind > 25) mod -= 6;
    else if (wind > 15) mod -= 2;
    else if (wind < 10) mod += 3; // Windstill gut

    // Wetterlage
    if (condition.includes('sunny') || condition.includes('clear')) mod += 3;
    if (condition.includes('storm') || condition.includes('thunder')) mod -= 15;
    if (condition.includes('fog')) mod -= 4;
    if (condition.includes('cloudy') && !condition.includes('partly')) mod += 2;

    // Nur für erste 7 Tage: WEEK-Werte nutzen wenn vorhanden
    if (i < WEEK.length && WEEK[i]) {
      // Mix: 70% Sensor, 30% Wetterberechnung
      base = Math.round(WEEK[i] * 0.7 + (65 + mod) * 0.3);
    } else {
      base = Math.round(65 + mod);
    }

    return Math.min(95, Math.max(15, base));
  });
})();
          drawChart('chart14', d14, '#a78bfa');
          addChartTouch('chart14', d14, '#a78bfa');
        }
      } catch(e) { console.error('Chart Fehler:', e); }
    }, 80);
  } else {
    // forecastContent nicht gefunden → ganzen View neu laden
    currentView = 'forecast';
    buildNav();
    renderView();
  }
}

// ── Leaflet Spot-Karte ───────────────────────────────────────────────────────
let _spotMap = null;
let _spotMarkers = [];
let _spotData = [];
let _userMarker = null;

function initSpotMap(spots) {
  _spotData = spots;
  const mapEl = document.getElementById('spotMap');
  if (!mapEl) return;

  // Leaflet nicht geladen → warten
  if (typeof L === 'undefined') {
    mapEl.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-size:13px;flex-direction:column;gap:8px"><div style="font-size:32px">🗺️</div><div>Karte lädt...</div></div>';
    setTimeout(() => initSpotMap(spots), 600);
    return;
  }

  // Alte Karte entfernen
  if (_spotMap) { _spotMap.remove(); _spotMap = null; _spotMarkers = []; }

  // Leaflet Map initialisieren
  _spotMap = L.map('spotMap', {
    center: [52.476, 9.800],
    zoom: 13,
    zoomControl: true,
    attributionControl: true,
    tap: true,
  });

  // OpenStreetMap Tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19,
    minZoom: 4,
  }).addTo(_spotMap);

  // GPS-Button
  const gpsBtn = L.control({ position: 'topleft' });
  gpsBtn.onAdd = () => {
    const div = L.DomUtil.create('div', 'leaflet-bar');
    div.innerHTML = '<a href="#" title="Meinen Standort anzeigen" style="font-size:18px;display:flex;align-items:center;justify-content:center;width:30px;height:30px;background:rgba(10,24,38,.9);color:#2ea8ff;border:1px solid rgba(46,168,255,.3)">📍</a>';
    div.onclick = (e) => { e.preventDefault(); locateUser(); };
    return div;
  };
  gpsBtn.addTo(_spotMap);

  const sc3 = v => v>=80?'#67d33f':v>=65?'#ffd23f':'#ff9d18';

  // Marker für jeden Spot
  spots.forEach((spot, i) => {
    const color = sc3(spot.s);
    const icon = L.divIcon({
      className: 'spot-score-marker',
      html: `<div class="spot-score-bubble" style="background:${color}" onclick="showSpotDetail(${i})">
               <span>${spot.s}%</span>
             </div>`,
      iconSize: [44, 44],
      iconAnchor: [22, 22],
      popupAnchor: [0, -26],
    });

    const popup = L.popup({ closeButton: true, maxWidth: 240 }).setContent(`
      <div style="min-width:180px">
        <div style="font-size:15px;font-weight:900;margin-bottom:4px">📍 ${spot.n}</div>
        <div style="font-size:22px;font-weight:950;color:${color};margin-bottom:6px">${spot.s}% <span style="font-size:12px;font-weight:700;color:rgba(255,255,255,.6)">${spot.l}</span></div>
        <div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:4px">🐟 ${spot.fish}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.4)">${spot.type} · ${spot.depth}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.55);margin-top:6px;line-height:1.4">💡 ${spot.tip}</div>
      </div>`);

    const marker = L.marker([spot.lat, spot.lng], { icon })
      .addTo(_spotMap)
      .bindPopup(popup)
      .on('click', () => showSpotDetail(i));

    _spotMarkers.push(marker);
  });

  // Alle Spots in View
  if (_spotMarkers.length > 0) {
    const group = L.featureGroup(_spotMarkers);
    _spotMap.fitBounds(group.getBounds().pad(0.3));
  }
}

function locateUser() {
  if (!_spotMap) return;
  // Erst HA person-Entity versuchen (HA Companion App)
  const person = haStates['person.christian_rduch'] ||
    Object.values(haStates).find(s => s.entity_id?.startsWith('person.'));
  const lat = person?.attributes?.latitude;
  const lng = person?.attributes?.longitude;
  if (lat && lng) {
    if (_userMarker) _userMarker.remove();
    _userMarker = L.circleMarker([lat, lng], {
      radius: 10, fillColor: '#2ea8ff', color: '#fff',
      weight: 3, opacity: 1, fillOpacity: 0.9,
    }).addTo(_spotMap).bindPopup('📍 Dein Standort (HA)').openPopup();
    _spotMap.flyTo([lat, lng], 13, { animate: true, duration: 0.8 });
    return;
  }
  // Fallback: Browser GPS
  _spotMap.locate({ setView: true, maxZoom: 13 });
  _spotMap.once('locationfound', (e) => {
    if (_userMarker) _userMarker.remove();
    _userMarker = L.circleMarker(e.latlng, {
      radius: 10, fillColor: '#2ea8ff', color: '#fff',
      weight: 3, opacity: 1, fillOpacity: 0.9,
    }).addTo(_spotMap).bindPopup('📍 Dein Standort').openPopup();
  });
  _spotMap.once('locationerror', () => {
    const msg = document.createElement('div');
    msg.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,100,100,.9);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999';
    msg.textContent = '📍 Standort nicht verfügbar';
    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 3000);
  });
}

function focusSpot(i) {
  if (_spotMap && _spotData[i]) {
    _spotMap.flyTo([_spotData[i].lat, _spotData[i].lng], 15, { animate: true, duration: 0.8 });
    setTimeout(() => {
      if (_spotMarkers[i]) _spotMarkers[i].openPopup();
    }, 900);
    showSpotDetail(i);
  }
}

function showSpotDetail(i) {
  const spot = _spotData[i];
  if (!spot) return;
  const sc3 = v => v>=80?'#67d33f':v>=60?'#ffd23f':'#ff9d18';
  const detail = document.getElementById('spotDetail');
  if (!detail) return;
  detail.className = 'spot-detail-panel active';
  detail.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-size:16px;font-weight:900">📍 ${spot.n}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:2px">${spot.type} · Tiefe ${spot.depth}</div>
      </div>
      <div style="font-size:28px;font-weight:950;color:${sc3(spot.s)}">${spot.s}%</div>
    </div>
    <div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px;color:rgba(255,255,255,.7);line-height:1.5">
      💡 ${spot.tip}
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.55)">🐟 <b style="color:rgba(255,255,255,.8)">${spot.fish}</b></div>
    <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">
      ${spot.s>=80?'⭐ Sehr gute Bedingungen heute':spot.s>=65?'✓ Gute Bedingungen heute':'~ Mittelmäßige Bedingungen'}
    </div>`;
}

function openFishSheet(targetVar, onSelect, currentVal) {
  const getCurrent = () => currentVal || window[targetVar] || '';
  const GROUPS = [
    { label: '🎣 Raubfische', fish: ['Zander','Hecht','Barsch','Aal','Forelle'] },
    { label: '🌿 Friedfische', fish: ['Karpfen','Schleie','Brasse','Rotauge','Rotfeder'] },
    { label: '⚡ Sonderfälle', fish: ['Döbel','Rapfen'] },
  ];

  const overlay = document.createElement('div');
  overlay.className = 'fish-sheet-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const sheet = document.createElement('div');
  sheet.className = 'fish-sheet';
  sheet.innerHTML = `<div class="fish-sheet-handle"></div><div class="fish-sheet-title">Fischart wählen</div>`;

  GROUPS.forEach(g => {
    const grpEl = document.createElement('div');
    grpEl.className = 'fish-sheet-group';
    grpEl.textContent = g.label;
    sheet.appendChild(grpEl);

    g.fish.forEach(f => {
      const d = fishData[f] || {};
      const item = document.createElement('div');
      item.className = 'fish-sheet-item' + (f === getCurrent() ? ' active' : '');
      const svgIcon = (FISH_SVG && FISH_SVG[f]) || '';
      const sc4 = d.score >= 80 ? '#67d33f' : d.score >= 65 ? '#ffd23f' : '#ff9d18';
      item.innerHTML = `
        ${svgIcon}
        <div>
          <div class="fish-sheet-item-name">${f}</div>
          <div class="fish-sheet-item-type">${d.type==='raubfisch'?'Raubfisch':d.type==='sonderfall'?'Sonderfall':'Friedfisch'}</div>
        </div>
        <div class="fish-sheet-item-score" style="color:${sc4}">${d.score||'?'}%</div>`;
      item.onclick = () => {
        window[targetVar] = f;
        overlay.remove();
        onSelect(f);
      };
      sheet.appendChild(item);
    });
  });

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}
