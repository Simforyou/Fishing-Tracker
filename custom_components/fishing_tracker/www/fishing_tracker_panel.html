<script>
// ── Clock ──────────────────────────────────────────────────────────────────────
setInterval(() => {
  const t = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock').textContent = t + ' Uhr';
}, 1000);

// ── Connect to HA via parent window ───────────────────────────────────────────
let haConnection = null;
let haStates = {};
let currentView = 'overview';

// Try to get HA connection from parent
async function connectHA() {
  try {
    // HA iframe: parent has hassConnection
    if (window.parent && window.parent.customElements) {
      const haEl = window.parent.document.querySelector('home-assistant');
      if (haEl && haEl.hass) {
        haStates = haEl.hass.states || {};
        return true;
      }
    }
  } catch(e) {}
  return false;
}

function getState(entityId, fallback = '--') {
  const s = haStates[entityId];
  return s ? s.state : fallback;
}

function getAttr(entityId, attr, fallback = '--') {
  const s = haStates[entityId];
  return s && s.attributes ? (s.attributes[attr] ?? fallback) : fallback;
}

// ── Navigation ────────────────────────────────────────────────────────────────
const VIEWS = [
  ['overview', '🏠', 'Übersicht'],
  ['forecast', '📈', 'Prognosen'],
  ['species',  '🎯', 'Zielfische'],
  ['spots',    '📍', 'Spots'],
  ['logbook',  '📘', 'Fangbuch'],
  ['stats',    '📊', 'Statistiken'],
  ['bait',     '🪱', 'Köder-Wizard'],
  ['weather',  '🌦️', 'Wetter'],
  ['settings', '⚙️', 'Einstellungen'],
];

function buildNav() {
  document.getElementById('nav').innerHTML = VIEWS.map(([v, i, l]) =>
    `<button class="ft-nav-btn ${v === currentView ? 'active' : ''}"
      onclick="switchView('${v}')">${i} ${l}</button>`
  ).join('');
}

function switchView(v) {
  currentView = v;
  buildNav();
  renderView();
  // Prognosen-View: sofort Content laden
  // Forecast wird direkt in der view-Funktion gerendert
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function smooth(pp) {
  if (pp.length < 2) return pp.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ');
  let d = 'M'+pp[0][0]+','+pp[0][1];
  for (let i=0; i<pp.length-1; i++) {
    const t = 0.25;
    const cp1x = pp[i][0]+(pp[i+1][0]-pp[i][0])*t;
    const cp2x = pp[i+1][0]-(pp[i+1][0]-pp[i][0])*t;
    d += ' C'+cp1x+','+pp[i][1]+' '+cp2x+','+pp[i+1][1]+' '+pp[i+1][0]+','+pp[i+1][1];
  }
  return d;
}

function drawChart(id, pts, color = '#ff9d18', todayIdx = null) {
  const svg = document.getElementById(id);
  if (!svg) return;
  // Feste Dimensionen mit Y-Achse links
  const w=900, h=220, padL=38, padR=10, padT=16, padB=24;
  const step = (w - padL - padR) / (pts.length - 1);
  // FIXE Y-Achse 0-100% – kein Auto-Scale!
  const pp = pts.map((v,i) => [padL + i*step, padT + (1 - v/100) * (h - padT - padB)]);
  // Bezier smooth
  let smoothPath = 'M'+pp[0][0]+','+pp[0][1];
  for (let i=0; i<pp.length-1; i++) {
    // Tension 0.25: glatt aber nah an Datenpunkten → kein Schweben
    const tension = 0.25;
    const cx1=pp[i][0]+(pp[i+1][0]-pp[i][0])*tension;
    const cx2=pp[i+1][0]-(pp[i+1][0]-pp[i][0])*tension;
    smoothPath += ` C${cx1},${pp[i][1]} ${cx2},${pp[i+1][1]} ${pp[i+1][0]},${pp[i+1][1]}`;
  }
  const area = `M${pp[0][0]},${h-padB} ${smoothPath.slice(1)} L${pp[pp.length-1][0]},${h-padB} Z`;
  const nh = new Date().getHours();
  // Wochenchart: todayIdx nutzen; Tages-Chart: aktuelle Stunde
  const ni = (todayIdx !== null) ? Math.min(todayIdx, pts.length-1) : Math.min(nh, pts.length-1);
  const nx = pp[ni][0], ny = pp[ni][1];
  const labs = pts.length > 8 ? ['00','03','06','09','12','15','18','21'] : ['Mo','Di','Mi','Do','Fr','Sa','So'];
  // Y-Achse: 0/25/50/75/100%
  const yLines = [100,75,50,25,0].map(pct => {
    const y = padT + (1-pct/100)*(h-padT-padB);
    return `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(255,255,255,${pct===50?'.12':'.06'})"/>
            <text x="${padL-3}" y="${y+4}" fill="rgba(255,255,255,.35)" font-size="9" text-anchor="end" font-family="system-ui">${pct}</text>`;
  }).join('');
  svg.innerHTML = `
    <defs><linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".22"/>
      <stop offset="100%" stop-color="${color}" stop-opacity=".02"/>
    </linearGradient></defs>
    ${yLines}
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="rgba(255,255,255,.15)"/>
    ${labs.map((l,i)=>`<text x="${padL+i*(w-padL-padR)/(labs.length-1)}" y="${h-5}" fill="rgba(255,255,255,.4)" font-size="10" text-anchor="middle" font-family="system-ui">${l}</text>`).join('')}
    <path d="${area}" fill="url(#g${id})"/>
    <path d="${smoothPath}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="${nx}" y1="${padT+18}" x2="${nx}" y2="${h-padB}" stroke="rgba(255,215,0,.6)" stroke-width="2" stroke-dasharray="5 3"/>
    <rect x="${nx-18}" y="${padT+2}" width="36" height="16" rx="4" fill="rgba(255,215,0,.15)" stroke="rgba(255,215,0,.5)" stroke-width="1"/>
    <text x="${nx}" y="${padT+13}" fill="#ffd23f" font-size="10" font-weight="800" text-anchor="middle" font-family="system-ui">Jetzt</text>`;
}

// ── Einheitliche Datenbasis: DAY + WEEK aus HA-Sensoren ─────────────────────
// DAY: 24 Stundenwerte – Backend-Sensor + stündliche Wettermodulation
const _dayForecastAttr = findFTSensor('daily_forecast')?.attributes;
const _hourlyFc = haStates['weather.home']?.attributes?.forecast || [];

// Stündliche Wettermodifikatoren berechnen
const _hourlyMod = new Array(24).fill(0);
_hourlyFc.forEach(fc => {
  try {
    const h = new Date(fc.datetime).getHours();
    let mod = 0;
    const rain = parseFloat(fc.precipitation || 0);
    const rainProb = parseFloat(fc.precipitation_probability || 0);
    const wind = parseFloat(fc.wind_speed || 0);
    const temp = parseFloat(fc.temperature || 12);
    // Regen: leichter Regen gut (+3), starker Regen schlecht (-8)
    if (rain > 5) mod -= 8;
    else if (rain > 2) mod -= 4;
    else if (rain > 0.5) mod += 3;
    // Hohe Regenwahrscheinlichkeit
    if (rainProb > 80) mod -= 5;
    else if (rainProb > 60) mod -= 2;
    // Starker Wind
    if (wind > 30) mod -= 8;
    else if (wind > 20) mod -= 3;
    // Temperatur
    if (temp < 3) mod -= 5;
    else if (temp > 25) mod -= 3;
    _hourlyMod[h] = mod;
  } catch(e) {}
});

const DAY = (() => {
  if (_dayForecastAttr?.points?.length >= 20) {
    const pts = new Array(24).fill(50);
    _dayForecastAttr.points.forEach(p => {
      try {
        const h = new Date(p.timestamp).getHours();
        // Backend-Score + stündliche Wettermodulation
        const raw = Math.round(p.score) + _hourlyMod[h];
        pts[h] = Math.min(95, Math.max(5, raw));
      } catch(e){}
    });
    return pts;
  }
  // Fallback: Demo mit Wettermodulation
  const base = [28,25,32,30,28,26,25,42,60,68,72,70,65,60,55,52,58,68,88,92,85,72,58,42];
  return base.map((v,h) => Math.min(95, Math.max(5, v + _hourlyMod[h])));
})();

  if (_weekForecastAttr?.length >= 7) {
    return _weekForecastAttr.slice(0,7).map(d => ({
      d: d.weekday, date: d.date_str, v: Math.round(d.avg_score), isToday: d.is_today
    }));
  }
  // Fallback: Mo-So ab aktuellem Montag
  const days = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const vals = [72,65,58,71,68,74,62];
  const todayDow = new Date().getDay();
  const moOff = todayDow===0?6:todayDow-1;
  return days.map((d,i) => ({
    d, v: vals[i], isToday: i===moOff,
    date: (() => { const dt=new Date(); dt.setDate(dt.getDate()-moOff+i); return dt.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); })()
  }));
})();

function baitCard(name, sub) {
  const key = BAIT_ALIAS[name] || name.replace(/ \d+.*cm$/,'').replace(/ \(.*\)$/,'');
  const icon = BAIT_ICONS[key] || BAIT_ICONS['Gummifisch'];
  return `<div class="bait-card"><div class="bait-icon">${icon}</div><div><div class="bait-name">${name}</div><div class="bait-sub">${sub||key}</div></div></div>`;
}

    </div>
  </div>`;
}




// ── Multi-Source Wetterverifikation ──────────────────────────────────────────
// Priorität: 1. Lokale Wetterstation (haftenkamp_*) → präziseste Daten
//            2. Online-Wetter-Entities (weather.home, dwd_weather usw.)
//            3. Vergleich beider Quellen → Konfidenz-Indikator
function getVerifiedWeather() {

  // ── 1. LOKALE WETTERSTATION ─────────────────────────────────────────────
  const localStation = {
    temperature:    parseFloat(haStates['sensor.haftenkamp_temperatur']?.state),
    wind_speed:     parseFloat(haStates['sensor.haftenkamp_windgeschwindigkeit']?.state),
    wind_gusts:     parseFloat(haStates['sensor.haftenkamp_windboen']?.state),
    wind_bearing:   parseFloat(haStates['sensor.haftenkamp_windrichtung']?.state),
    pressure:       parseFloat(haStates['sensor.haftenkamp_druck']?.state),
    precipitation:  parseFloat(haStates['sensor.haftenkamp_niederschlag']?.state),
    cloud_coverage: parseFloat(haStates['sensor.haftenkamp_bewolkungsgrad']?.state),
    humidity:       parseFloat(haStates['sensor.haftenkamp_relative_luftfeuchtigkeit']?.state),
    solar_radiation:parseFloat(haStates['sensor.haftenkamp_sonneneinstrahlung']?.state),
  };
  const localAvailable = !isNaN(localStation.temperature) && !isNaN(localStation.wind_speed);

  // ── 2. ONLINE-WETTER-ENTITIES ───────────────────────────────────────────
  const ONLINE_ENTITIES = [
    'weather.home', 'weather.dwd_weather', 'weather.dwd_weather_hourly',
    'weather.met_no', 'weather.openweathermap', 'weather.open_meteo',
    'weather.accuweather', 'weather.buienradar', 'weather.pirateweather',
    'weather.tomorrow_io', 'weather.home_2',
  ];
  const onlineSources = [];
  for (const entity of ONLINE_ENTITIES) {
    const s = haStates[entity];
    if (!s?.attributes?.temperature) continue;
    const a = s.attributes;
    onlineSources.push({
      entity,
      temperature:    parseFloat(a.temperature   || 0),
      wind_speed:     parseFloat(a.wind_speed     || 0),
      wind_bearing:   parseFloat(a.wind_bearing   || 0),
      pressure:       parseFloat(a.pressure       || 1015),
      precipitation:  parseFloat(a.precipitation  || 0),
      cloud_coverage: parseFloat(a.cloud_coverage || 50),
      humidity:       parseFloat(a.humidity       || 70),
      forecast:       a.forecast || [],
    });
  }

  // Mittelwert aller Online-Quellen
  const onlineAvg = key => onlineSources.length
    ? onlineSources.reduce((s, x) => s + (x[key] || 0), 0) / onlineSources.length
    : null;

  // ── 3. ZUSAMMENFÜHREN ──────────────────────────────────────────────────
  // Lokale Station hat Priorität wo vorhanden
  const merged = {
    temperature:    localAvailable && !isNaN(localStation.temperature)
                      ? localStation.temperature
                      : onlineAvg('temperature') ?? 12,
    wind_speed:     localAvailable && !isNaN(localStation.wind_speed)
                      ? localStation.wind_speed
                      : onlineAvg('wind_speed') ?? 10,
    wind_gusts:     localAvailable && !isNaN(localStation.wind_gusts)
                      ? localStation.wind_gusts
                      : (onlineAvg('wind_speed') ?? 10) * 1.3,
    wind_bearing:   localAvailable && !isNaN(localStation.wind_bearing)
                      ? localStation.wind_bearing
                      : onlineAvg('wind_bearing') ?? 0,
    pressure:       localAvailable && !isNaN(localStation.pressure)
                      ? localStation.pressure
                      : onlineAvg('pressure') ?? 1015,
    precipitation:  localAvailable && !isNaN(localStation.precipitation)
                      ? localStation.precipitation
                      : onlineAvg('precipitation') ?? 0,
    cloud_coverage: localAvailable && !isNaN(localStation.cloud_coverage)
                      ? localStation.cloud_coverage
                      : onlineAvg('cloud_coverage') ?? 50,
    humidity:       localAvailable && !isNaN(localStation.humidity)
                      ? localStation.humidity
                      : onlineAvg('humidity') ?? 70,
    // Solar nur von lokaler Station – kein API hat das!
    solar_radiation: !isNaN(localStation.solar_radiation) ? localStation.solar_radiation : null,
    // Forecast nur von Online (lokale Station hat keine Vorhersage)
    forecast:       onlineSources[0]?.forecast || [],
  };

  // ── 4. KONFIDENZ / VERIFIKATION ────────────────────────────────────────
  let confidence = 'single', deviation = 0, sourceLabel = '';
  const totalSources = (localAvailable ? 1 : 0) + onlineSources.length;

  if (localAvailable && onlineSources.length > 0) {
    const onlineTemp = onlineAvg('temperature');
    deviation = Math.abs(localStation.temperature - onlineTemp);
    deviation = Math.round(deviation * 10) / 10;
    if (deviation <= 1.0)      confidence = 'high';
    else if (deviation <= 2.5) confidence = 'medium';
    else                        confidence = 'low';
    const onlineName = onlineSources[0].entity.replace('weather.','');
    sourceLabel = `Haftenkamp + ${onlineName}`;
  } else if (localAvailable) {
    confidence = 'local_only';
    sourceLabel = 'Wetterstation Haftenkamp';
  } else if (onlineSources.length > 0) {
    confidence = onlineSources.length > 1 ? 'online_multi' : 'single';
    sourceLabel = onlineSources.map(s => s.entity.replace('weather.','')).join(' + ');
  }

  return { ...merged, sourceCount: totalSources, confidence, deviation, sourceLabel,
           localAvailable, onlineCount: onlineSources.length };
}

// Konfidenz-Badge für UI
function weatherConfidenceBadge(wx) {
  if (!wx || wx.sourceCount === 0)
    return '<span style="color:rgba(255,255,255,.3);font-size:10px">⚠ Keine Wetterdaten</span>';
  if (wx.confidence === 'local_only')
    return `<span style="color:#67d33f;font-size:10px">📡 ${wx.sourceLabel}</span>`;
  if (wx.confidence === 'high')
    return `<span style="color:#67d33f;font-size:10px">✅ ${wx.sourceLabel} · Δ${wx.deviation}°C</span>`;
  if (wx.confidence === 'medium')
    return `<span style="color:#f0b429;font-size:10px">⚠️ ${wx.sourceLabel} · Δ${wx.deviation}°C</span>`;
  if (wx.confidence === 'low')
    return `<span style="color:#e53e3e;font-size:10px">❌ Differenz ${wx.deviation}°C – Lokale Station bevorzugt</span>`;
  if (wx.confidence === 'online_multi')
    return `<span style="color:#67d33f;font-size:10px">✅ ${wx.sourceCount} Online-Quellen</span>`;
  return `<span style="color:rgba(255,255,255,.4);font-size:10px">📡 ${wx.sourceLabel}</span>`;
}

// ── Sensor-Finder: findet FT-Sensoren unabhängig vom Entity-ID ───────────────
// Sucht in haStates nach fishing_tracker Sensoren anhand von Attribut-Schlüsseln
const _ftSensors = {};  // Cache

function findFTSensor(type) {
  if (_ftSensors[type]) return _ftSensors[type];

  // Bekannte IDs zuerst probieren
  const knownIds = {
    history:          ['sensor.fishing_tracker_history', 'sensor.fishing_tracker_fanghistorie', 'sensor.fishing_tracker_history_sensor'],
    bite_chance:      ['sensor.fishing_tracker_bite_chance', 'sensor.fishing_tracker_beisschance', 'sensor.beisschance'],
    map_data:         ['sensor.fishing_tracker_map_data'],
    species_ranking:  ['sensor.fishing_tracker_species_ranking', 'sensor.fischarten_ranking'],
    best_time:        ['sensor.fishing_tracker_best_time', 'sensor.fishing_tracker_best_time_today', 'sensor.beste_angelzeit'],
    angelwetter:      ['sensor.fishing_tracker_angelwetter_index'],
    spot_analysis:    ['sensor.fishing_tracker_spot_analysis'],
    pressure_trend:   ['sensor.fishing_tracker_pressure_trend'],
    daily_forecast:   ['sensor.fishing_tracker_bite_forecast_day'],
    week_forecast:    ['sensor.fishing_tracker_bite_forecast_week'],
    daily_fc_sensor:  ['sensor.fishing_tracker_daily_forecast'],
  };

  // Erkennungsattribute je Sensor-Typ
  const detectAttrs = {
    history:         ['total_catches', 'fish_ranking', 'monthly', 'entries', 'latest'],
    bite_chance:     [],
    map_data:        ['catches', 'heatmap', 'spots'],
    species_ranking: ['ranking'],
    best_time:       [],
    angelwetter:     ['water_score', 'weather_score', 'season_score'],
    spot_analysis:   ['nearest_spot'],
  };

  // 1. Bekannte IDs probieren
  for (const id of (knownIds[type] || [])) {
    if (haStates[id]) { _ftSensors[type] = haStates[id]; return haStates[id]; }
  }

  // 2. Alle fishing_tracker Entitäten durchsuchen
  const attrs = detectAttrs[type] || [];
  for (const [eid, state] of Object.entries(haStates)) {
    if (!eid.startsWith('sensor.')) continue;
    if (!eid.includes('fishing') && !eid.includes('fang') && !eid.includes('angel')) continue;
    if (attrs.length > 0 && attrs.some(a => state.attributes?.[a] !== undefined)) {
      _ftSensors[type] = state;
      console.log('FT Sensor gefunden:', type, '→', eid);
      return state;
    }
  }
  return null;
}

// ── Allgemeiner Angelwetter-Tagesindex (NICHT fischart- oder uhrzeit-spezifisch) ──
// Basiert auf wissenschaftlicher Gewichtung (IGB Berlin, Guidesly, LAVB Brandenburg):
//   35% Wassertemperatur, 30% Wetter, 20% Saison, 10% Mondphase, 5% Luftdrucktrend
function calcAngelwetterIndex() {
  const wx       = getVerifiedWeather();
  const waterT   = parseFloat(haStates['sensor.wassertemperatur_gewaesser']?.state || 13);
  const cloud    = wx.cloud_coverage;
  const wind     = wx.wind_speed;
  const windBear = wx.wind_bearing;
  const rain     = wx.precipitation;
  const solar    = wx.solar_radiation;  // W/m² – nur von lokaler Station
  const moonPh   = String(haStates['sensor.moon']?.state || '').toLowerCase();
  const trend    = parseFloat(findFTSensor('pressure_trend')?.state || 0);
  const month    = new Date().getMonth() + 1;

  // ── 35% Wassertemperatur (volle 0-100 Skala) ─────────────────────────────
  // Idealbereich Süßwasserfische: 14-20°C (Center 17°C)
  let waterScore;
  if (waterT >= 15 && waterT <= 19)       waterScore = 100;  // Perfekt!
  else if (waterT >= 13 && waterT <= 21)  waterScore = 85;   // Sehr gut
  else if (waterT >= 11 && waterT <= 23)  waterScore = 70;   // Gut
  else if (waterT >= 8 && waterT <= 26)   waterScore = 50;   // Mittel
  else if (waterT >= 5 && waterT <= 28)   waterScore = 30;   // Schwach
  else                                     waterScore = 12;   // Extrem

  // ── 30% Wetter (volle 0-100 Skala) ──────────────────────────────────────
  let weatherScore = 40;  // Basis
  // Bewölkung
  if (cloud >= 50 && cloud <= 80)         weatherScore += 22;  // Perfekt
  else if (cloud >= 35 && cloud < 50)     weatherScore += 16;
  else if (cloud > 80 && cloud <= 95)     weatherScore += 12;
  else if (cloud > 20 && cloud < 35)      weatherScore += 5;
  else if (cloud > 95)                    weatherScore += 4;
  else                                     weatherScore -= 10;  // Knallsonne
  // Wind (8-15 km/h ideal)
  if (wind >= 8 && wind <= 15)            weatherScore += 18;
  else if (wind > 15 && wind <= 22)       weatherScore += 12;
  else if (wind >= 4 && wind < 8)         weatherScore += 8;
  else if (wind > 22 && wind <= 30)       weatherScore += 3;
  else if (wind > 35)                     weatherScore -= 20;
  else                                     weatherScore -= 5;  // Windstille
  // Windrichtung (SW/W ideal)
  if (windBear >= 180 && windBear <= 270) weatherScore += 10;
  else if (windBear > 270 && windBear <= 315) weatherScore += 6;
  else if (windBear >= 0 && windBear <= 60) weatherScore -= 6;
  // Niederschlag (leicht ideal)
  if (rain >= 0.3 && rain <= 1.5)         weatherScore += 12;
  else if (rain > 1.5 && rain <= 3)       weatherScore += 6;
  else if (rain > 0 && rain < 0.3)        weatherScore += 4;
  else if (rain > 8)                       weatherScore -= 20;
  else if (rain > 3 && rain <= 8)         weatherScore -= 5;
  // Sonneneinstrahlung: präziser als Bewölkungsgrad allein
  // Niedrig = gut (Dämmerung/bewölkt), hoch = schlecht (Mittagssonne blendet Fische)
  if (solar !== null && !isNaN(solar)) {
    if (solar < 50)          weatherScore += 8;   // Dunkel/Dämmerung: ideal
    else if (solar < 200)    weatherScore += 4;   // Leicht
    else if (solar < 500)    weatherScore += 0;   // Moderat: neutral
    else if (solar < 800)    weatherScore -= 6;   // Hell: ungünstig
    else                     weatherScore -= 12;  // Volles Sonnenlicht: schlecht
  }
  weatherScore = Math.max(0, Math.min(100, weatherScore));

  // ── 20% Saison (volle 0-100 Skala) ──────────────────────────────────────
  let seasonScore;
  if (month === 5 || month === 6)         seasonScore = 100;  // Mai/Juni Peak
  else if (month === 9 || month === 10)   seasonScore = 95;   // Herbst-Fresswelle
  else if (month === 4)                    seasonScore = 88;   // April
  else if (month === 7 || month === 8)    seasonScore = 70;   // Sommer (Hitze)
  else if (month === 3 || month === 11)   seasonScore = 65;   // Übergang
  else if (month === 2)                    seasonScore = 45;
  else if (month === 12 || month === 1)   seasonScore = 30;   // Winter

  // ── 10% Mondphase (volle 0-100 Skala) ───────────────────────────────────
  let moonScore = 50;
  if (moonPh.includes('voll') || moonPh.includes('full'))      moonScore = 100;
  else if (moonPh.includes('neu') || moonPh.includes('new'))   moonScore = 95;
  else if (moonPh.includes('zunehmend_dreiviertel') || moonPh.includes('abnehmend_dreiviertel') ||
           moonPh.includes('waxing_gibbous') || moonPh.includes('waning_gibbous')) moonScore = 75;
  else if (moonPh.includes('viertel') || moonPh.includes('quarter')) moonScore = 60;
  else if (moonPh.includes('sichel') || moonPh.includes('crescent')) moonScore = 55;

  // ── 5% Luftdrucktrend (volle 0-100 Skala) ───────────────────────────────
  // Fallender Druck = Fressfenster vor Front
  let pressureScore;
  if (trend >= -2 && trend < -1)          pressureScore = 100;  // Ideal: leicht fallend
  else if (trend >= -3 && trend < -2)     pressureScore = 90;
  else if (trend >= -1 && trend < -0.3)   pressureScore = 75;
  else if (trend >= -0.3 && trend <= 0.5) pressureScore = 55;   // Stabil
  else if (trend > 0.5 && trend <= 1.5)   pressureScore = 40;
  else if (trend > 1.5 && trend <= 3)     pressureScore = 25;
  else if (trend > 3)                      pressureScore = 12;   // Stark steigend
  else                                     pressureScore = 70;   // Stark fallend (Sturm)

  return Math.round(
    waterScore    * 0.35 +
    weatherScore  * 0.30 +
    seasonScore   * 0.20 +
    moonScore     * 0.10 +
    pressureScore * 0.05
  );
}




// Nächsten Regen aus sensor.neuenhaus_radar_nachster_niederschlag
function getNextRainInfo() {
  const s = haStates['sensor.neuenhaus_radar_nachster_niederschlag'];
  if (!s || !s.state || s.state === 'unknown' || s.state === 'unavailable') return null;

  // Deutschen Datumsstring parsen: "16. Mai 2026 um 11:30 Uhr"
  const months = {Januar:0,Februar:1,März:2,April:3,Mai:4,Juni:5,
                  Juli:6,August:7,September:8,Oktober:9,November:10,Dezember:11};
  const raw = s.state.trim();
  let target = null;

  // Format: "16. Mai 2026 um 11:30 Uhr"
  const m = raw.match(/(\d+)\.\s+(\w+)\s+(\d{4})\s+um\s+(\d+):(\d+)/);
  if (m) {
    const mo = months[m[2]];
    if (mo !== undefined) {
      target = new Date(parseInt(m[3]), mo, parseInt(m[1]), parseInt(m[4]), parseInt(m[5]));
    }
  }
  // Fallback: direkt als Date parsen
  if (!target || isNaN(target)) target = new Date(raw);
  if (!target || isNaN(target)) return { label: raw, diff: null };

  const diffMs  = target - new Date();
  const diffMin = Math.round(diffMs / 60000);

  let label;
  if (diffMin < 0)       label = 'Regen aktiv';
  else if (diffMin < 60) label = 'in ' + diffMin + ' Min';
  else if (diffMin < 1440) {
    const h = Math.floor(diffMin/60), min = diffMin%60;
    label = 'in ' + h + 'h' + (min>0?' '+min+'min':'');
  } else {
    const days = Math.floor(diffMin/1440);
    label = 'in ' + days + ' Tag' + (days>1?'en':'');
  }

  return {
    label,
    raw,
    target,
    diffMin,
    isImminent: diffMin >= 0 && diffMin < 60,
    isToday: target.toDateString() === new Date().toDateString(),
  };
}

async function callHAService(domain, service, data) {
  const haEl = window.parent?.document?.querySelector('home-assistant');
  const hass  = haEl?.hass;

  // Methode 1: hass.callService (Standard-HA-API)
  if (hass?.callService) {
    try {
      await hass.callService(domain, service, data);
      return true;
    } catch(e) {
      console.warn('callService fehlgeschlagen:', e.message);
    }
  }

  // Methode 2: WebSocket Connection direkt (zuverlässigste Methode im Panel)
  const conn = hass?.connection;
  if (conn?.sendMessagePromise) {
    try {
      await conn.sendMessagePromise({
        type: 'call_service',
        domain,
        service,
        service_data: data,
      });
      return true;
    } catch(e) {
      console.warn('WS sendMessagePromise fehlgeschlagen:', e.message);
    }
  }

  // Methode 3: REST API mit Access Token aus HA-Connection
  try {
    const token = hass?.auth?.data?.access_token
               || hass?.connection?.options?.auth?.data?.access_token
               || '';
    const res = await fetch('/api/services/' + domain + '/' + service, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(token ? {'Authorization': 'Bearer ' + token} : {}),
      },
      credentials: 'include',
      body: JSON.stringify(data),
    });
    if (res.ok) return true;
    const txt = await res.text();
    let msg = txt;
    try { msg = JSON.parse(txt).message || txt; } catch(e) {}
    console.error('REST ' + res.status + ':', txt);
    alert('Fehler ' + res.status + ':\n' + msg.slice(0, 300));
    return false;
  } catch(e) {
    console.error('Netzwerkfehler:', e);
    alert('Netzwerkfehler:\n' + e.message);
    return false;
  }
}

async function saveCatch() {
  // Letzten DOM-Stand sichern vor dem Speichern
  ['fish','length','weight','spot','bait','notes'].forEach(k => {
    const el = document.getElementById('cf_' + k);
    if (el) catchFormData[k] = el.value;
  });

  const fish = catchFormData.fish;
  const len  = parseFloat(catchFormData.length || 0);
  const spot = (catchFormData.spot || '').trim();
  const bait = catchFormData.bait;

  if (!fish || !len || !spot || !bait) {
    alert('Bitte Fischart, Länge, Spot und Köder angeben.');
    return;
  }

  const weight = parseFloat(catchFormData.weight || 0) || null;
  const notes  = (catchFormData.notes || '').trim();
  const wx      = getVerifiedWeather();
  const waterT  = parseFloat(haStates['sensor.wassertemperatur_gewaesser']?.state || 0) || null;
  const person  = haStates['person.christian_rduch']?.attributes;
  const lat     = person?.latitude  ?? null;
  const lon     = person?.longitude ?? null;
  const awIdx   = calcAngelwetterIndex();

  const payload = {
    fish_type:         fish,
    length_cm:         len,
    spot:              spot,
    bait:              bait,
    notes:             notes,
    angelwetter_index: awIdx,
    ...(weight ? {weight_kg: weight} : {}),
    ...(lat    ? {latitude: lat, longitude: lon} : {}),
    ...(catchPhotoData ? {photo_data: catchPhotoData} : {}),
    ...(waterT ? {water_temp: waterT} : {}),
  };

  const btn = document.getElementById('cf_save');
  if (btn) { btn.textContent = '⏳ Speichern…'; btn.disabled = true; }

  const ok = await callHAService('fishing_tracker', 'log_catch', payload);
  if (ok) {
    catchFormActive = false;
    catchPhotoData  = null;
    renderView();
    // Kurze Erfolgsmeldung
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#07391b;border:1px solid #67d33f;color:#67d33f;padding:12px 24px;border-radius:12px;font-weight:800;font-size:14px;z-index:9999;';
    toast.textContent = '✅ Fang gespeichert!';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  } else {
    alert('⚠️ Fehler beim Speichern. Prüfe HA-Verbindung.');
    if (btn) { btn.textContent = '💾 Fang speichern'; btn.disabled = false; }
  }
}

function onPhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    // Bild auf max 1200px verkleinern + JPEG 82% komprimieren
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      catchPhotoData = canvas.toDataURL('image/jpeg', 0.82);
      const kb = Math.round(catchPhotoData.length * 0.75 / 1024);
      const lbl = document.getElementById('cf_photo_label');
      if (lbl) lbl.textContent = '✅ ' + file.name + ' (' + kb + ' KB)';
      renderView();  // Preview aktualisieren
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

    else if (temp >= 12 && temp <= 20) mod += 5;
    else if (temp > 28) mod -= 8;

      const _isCatch = e => { try { return parseInt(e.caught||0) >= 1; } catch(ex) { return false; } };
      const _all = [
        ..._entriesRaw,
        ..._latestRaw.filter(_isCatch),
      ];
      const _seen = new Set();
      const _raw = _all.filter(e => {
        if (!e.timestamp || _seen.has(e.timestamp)) return false;
        _seen.add(e.timestamp); return true;
      }).filter(_isCatch);
      const entries = [..._raw].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

      // Debug-Banner (verschwindet wenn Fänge da sind)
      const _debugInfo = !entries.length ? `<div style="background:rgba(255,160,0,.1);border:1px solid rgba(255,160,0,.3);border-radius:10px;padding:12px;margin-bottom:12px;font-size:11px;color:rgba(255,180,0,.8)">
        🔍 Debug: Sensor ${_sensorExists?'✅ vorhanden':'❌ fehlt'} &nbsp;|&nbsp;
        entries: ${_entriesRaw.length} &nbsp;|&nbsp;
        latest: ${_latestRaw.length} &nbsp;|&nbsp;
        alle Einträge (inkl. nicht-Fang): ${_latestRaw.length}<br>
        ${_latestRaw.length>0?'Letzter Eintrag caught='+_latestRaw[0]?.caught+' fish='+_latestRaw[0]?.fish_type:'Keine Einträge in latest'}
      </div>` : '';

      const fmtDate = ts => {
        const d = new Date(ts);
        return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})
             + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      };
      const fishEmoji = f => ({Zander:'🟡',Hecht:'🟢',Barsch:'🔴',Karpfen:'🟤',
        Schleie:'🟠',Aal:'⚫',Brasse:'⚪',Rotauge:'🔵',Forelle:'🟣',
        Rotfeder:'🟠',Döbel:'🟡',Rapfen:'⚡'}[f] || '🐟');

      return `
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="sec" style="margin-bottom:0">📘 Fangbuch</div>
          <button style="border:0;border-radius:9px;background:#145da0;color:#fff;padding:8px 16px;font-size:13px;font-weight:800;cursor:pointer"
            onclick="openCatchForm()">+ Fang erfassen</button>
        </div>
        ${_debugInfo}
        ${entries.length === 0
          ? '<div style="text-align:center;padding:30px;color:rgba(255,255,255,.3)">🐟 Noch keine Fänge gespeichert.<br><br><button style="border:1px solid rgba(103,211,63,.4);background:rgba(103,211,63,.1);color:#67d33f;padding:10px 20px;border-radius:10px;font-weight:800;cursor:pointer;font-size:13px" onclick="openCatchForm()">Ersten Fang erfassen</button></div>'
          : entries.map(e => `
        <div class="lb-entry" style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)">
          ${e.photo_url
            ? `<img src="${e.photo_url}"
                onclick="showPhotoLightbox('${e.photo_url}')"
                style="width:64px;height:64px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:zoom-in;border:2px solid rgba(103,211,63,.3)">`
            : `<div style="width:64px;height:64px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">${fishEmoji(e.fish_type)}</div>`}
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:900">${e.fish_type || '–'}</div>
            <div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">
              ${e.length_cm ? e.length_cm + ' cm' : ''}${e.weight_kg ? ' · ' + e.weight_kg + ' kg' : ''}
            </div>
            <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:2px">
              ${e.spot || ''} · ${e.bait || ''}
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">
              🕐 ${fmtDate(e.timestamp)}
              ${e.water_temp ? ' · 💧 ' + e.water_temp + '°C' : ''}
              ${e.angelwetter_index ? ' · 🎣 ' + e.angelwetter_index + '%' : ''}
            </div>
          </div>
          <button onclick="deleteCatch('${e.timestamp}')"
            style="align-self:center;background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.3);
                   color:#ff6b6b;border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;
                   flex-shrink:0;line-height:1" title="Fang löschen">🗑️</button>
        </div>`).join('')}
      </div>
      ${(()=>{
        const withGPS = entries.filter(e => e.latitude && e.longitude);
        if (withGPS.length === 0) return '';
        setTimeout(() => initLogMap(withGPS), 150);
        return '<div class="panel" style="padding-bottom:0"><div class="sec">🗺️ Fänge auf der Karte</div><div id="logMap" style="height:220px;border-radius:0 0 14px 14px"></div></div>';
      })()}`;
    },

    stats: () => {
      const h   = findFTSensor('history')?.attributes || {};
      const md  = findFTSensor('map_data')?.attributes || {};
      const total   = h.total_catches || 0;
      const totalW  = h.total_weight_kg || 0;
      const avgLen  = h.avg_length_cm || 0;
      const maxLen  = h.max_length_cm || 0;
      const monthly = h.monthly || Array(12).fill(0);
      const fishRank= h.fish_ranking || [];
      const spots   = (md.spots || []).filter(s => s.catches > 0);
      const maxMonth= Math.max(...monthly, 1);
      const maxFish = Math.max(...fishRank.map(f=>f.count), 1);
      const fishColors = {Zander:'#2ea8ff',Hecht:'#67d33f',Barsch:'#ff9d18',
        Karpfen:'#ffd23f',Schleie:'#ff6b6b',Aal:'#a78bfa',Brasse:'#94a3b8',
        Rotauge:'#34d399',Rotfeder:'#fb923c',Döbel:'#60a5fa',Rapfen:'#f472b6',Forelle:'#4ade80'};
      const monthLabs = ['J','F','M','A','M','J','J','A','S','O','N','D'];

      let out = '';

      // KPI-Zeile
      out += '<div class="kpi-row">';
      out += '<div class="kpi"><div class="kpi-label">Gesamtfänge</div><div class="kpi-val">'+total+'</div></div>';
      out += '<div class="kpi"><div class="kpi-label">Gesamtgewicht</div><div class="kpi-val">'+(totalW>0?totalW.toFixed(1)+' kg':'–')+'</div></div>';
      out += '<div class="kpi"><div class="kpi-label">Ø Länge</div><div class="kpi-val">'+(avgLen>0?Math.round(avgLen)+' cm':'–')+'</div></div>';
      out += '<div class="kpi"><div class="kpi-label">Rekord</div><div class="kpi-val">'+(maxLen>0?Math.round(maxLen)+' cm':'–')+'</div></div>';
      out += '</div>';

      if (total === 0)
        out += '<div class="panel" style="text-align:center;padding:30px;color:rgba(255,255,255,.3)">📊 Noch keine Fänge – erfasse deinen ersten Fang im Fangbuch!</div>';

      // Fänge nach Art
      out += '<div class="panel"><div class="sec">🐟 Fänge nach Art</div>';
      if (fishRank.length === 0) {
        out += '<div class="muted">Keine Daten</div>';
      } else {
        fishRank.forEach(function(item) {
          const col = fishColors[item.fish] || '#2ea8ff';
          const pct = Math.round(item.count/maxFish*100);
          out += '<div class="rank-row">';
          out += '<span style="font-size:13px;font-weight:800;width:90px">'+item.fish+'</span>';
          out += '<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>';
          out += '<span style="font-size:13px;font-weight:800;color:'+col+'">'+item.count+'</span>';
          out += '</div>';
        });
      }
      out += '</div>';

      // Monatliche Verteilung
      out += '<div class="panel blue"><div class="sec">📈 Fänge pro Monat</div>';
      out += '<div style="display:flex;align-items:flex-end;gap:4px;height:100px;padding-bottom:18px">';
      monthly.forEach(function(v, i) {
        const h = Math.max(v>0?6:2, Math.round(v/maxMonth*100));
        const bg = v>0 ? 'linear-gradient(to top,#2ea8ff,#67d33f)' : 'rgba(255,255,255,.06)';
        out += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%">';
        out += '<div style="flex:1;width:100%;display:flex;align-items:flex-end">';
        out += '<div style="width:100%;border-radius:3px 3px 0 0;background:'+bg+';height:'+h+'%"></div>';
        out += '</div>';
        out += '<div style="font-size:9px;color:var(--muted);margin-top:4px">'+monthLabs[i]+'</div>';
        if (v>0) out += '<div style="font-size:8px;color:#67d33f;font-weight:800">'+v+'</div>';
        out += '</div>';
      });
      out += '</div></div>';

      // Hit Spots Ranking
      if (spots.length > 0) {
        out += '<div class="panel"><div class="sec">🎯 Hit Spots (nach Fängen)</div>';
        spots.slice(0,5).forEach(function(s, i) {
          const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'';
          const bg = i===0?'#ffd23f':i===1?'rgba(255,255,255,.2)':'rgba(255,255,255,.1)';
          out += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)">';
          out += '<div style="width:28px;height:28px;border-radius:50%;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0">'+medal+'</div>';
          out += '<div style="flex:1">';
          out += '<div style="font-size:14px;font-weight:800">'+s.spot+'</div>';
          out += '<div style="font-size:12px;color:rgba(255,255,255,.6)">'+s.catches+' Fang'+(s.catches!==1?'e':'')+' · '+s.success_rate+'% Erfolg'+(s.top_fish?' · '+s.top_fish:'')+'</div>';
          if (s.top_bait) out += '<div style="font-size:11px;color:var(--muted)">🎣 Bester Köder: '+s.top_bait+'</div>';
          out += '</div>';
          out += '<div style="font-size:20px;font-weight:900;color:#67d33f">'+s.catches+'</div>';
          out += '</div>';
        });
        out += '</div>';
      }

      return out;
    },

    bait: () => {

          Rapfen:{frühling:['Blinker/Spinner','Wobbler'],sommer:['Oberflächenköder','Blinker/Spinner'],herbst:['Wobbler','Blinker/Spinner'],winter:['Wobbler']},
        };
        const bestKoeder = koeder[fish]?.[jahreszeit] || ['Wurm','Made','Mais'];

        recs = bestKoeder.slice(0,3).map((k,i) => ({rank:['🥇','🥈','🥉'][i], name:k, why: i===0?`Top-Köder für ${fish} im ${jahreszeit}`:i===1?stelleNote:wetterNote}));
        return `<div style="margin-top:16px">
          <div style="font-size:11px;font-weight:800;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Empfehlung: ${fish} · ${jahreszeit} · ${stelle}</div>
          ${recs.map(r=>`<div style="border-radius:13px;padding:12px 14px;margin-bottom:8px;display:flex;gap:11px;background:rgba(103,211,63,.08);border:1px solid rgba(103,211,63,.2)">
            <div style="font-size:20px">${r.rank}</div>
            <div><div class="bait-icon" style="display:inline-block;vertical-align:middle;width:32px;height:32px">${BAIT_ICONS[BAIT_ALIAS[r.name]||r.name]||''}</div>
            <span style="font-size:14px;font-weight:900;margin-left:8px">${r.name}</span>
            <div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:4px">${r.why}</div></div>
          </div>`).join('')}
          <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:12px;font-size:12px;color:rgba(255,255,255,.55);line-height:1.6">
            ${isSonder?`⚡ <b style="color:rgba(255,255,255,.85)">Sonderfall ${fish}:</b> ${fish==='Döbel'?'Allesfresser – im Sommer Vegetarier, im Herbst/Winter räuberisch. Sehr misstrauisch!':'Einziger Karpfenfisch der offiziell jagd. Sonnenschein = Oberflächenjagd!'}`

      return `

          <option value="" style="background:#0a1520">– Fischart wählen –</option>

          <div class="wiz-label">☀️ Licht / Wetter</div>

          ${!allSet?`<div style="text-align:center;padding:18px;color:rgba(255,255,255,.3);font-size:13px">${['🎣 Zielfisch wählen','💧 Trübung wählen','☀️ Licht wählen','📏 Tiefe wählen'][done]}</div>`:wizardResult(w)+`<button onclick="wizState={fish:null,turb:null,light:null,depth:null,stelle:null,jahreszeit:null,wetter:null};renderView()" style="border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);border-radius:10px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;margin-top:12px;font-family:inherit">↺ Neue Abfrage</button>`}
        ` : `
          <div class="wiz-label">📍 Angelstelle</div>
          <div style="margin-bottom:12px">${chip('stelle','oberfläche','🌊 Oberfläche / Mittelwasser')}${chip('stelle','grund','🪨 Grund / Boden')}</div>
          <div class="wiz-label">🍂 Jahreszeit</div>

        weather: () => `

function drawPressureChart(id, pastPts, futurePts, base) {
  const svg = document.getElementById(id);
  if (!svg) return;
  const w=900, h=130, padL=52, padR=16, padT=10, padB=24;
  const allPts = [...pastPts, ...futurePts];
  const minV = Math.min(...allPts)-3, maxV = Math.max(...allPts)+3;
  const range = maxV - minV || 10;
  const totalPts = pastPts.length + futurePts.length;
  const step = (w-padL-padR)/(totalPts-1);
  
  function toXY(val, idx) {
    return [
      padL + idx*step,
      padT + (1-(val-minV)/range)*(h-padT-padB)
    ];
  }
  
  const pastCoords = pastPts.map((v,i) => toXY(v,i));
  const futureCoords = futurePts.map((v,i) => toXY(v, pastPts.length-1+i));
  
  // Bezier smooth
  function bezier(coords) {
    if (!coords.length) return '';
    let d = 'M'+coords[0][0]+','+coords[0][1];
    for (let i=0; i<coords.length-1; i++) {
      const cp1x = coords[i][0]+(coords[i+1][0]-coords[i][0])*0.4;
      const cp2x = coords[i+1][0]-(coords[i+1][0]-coords[i][0])*0.4;
      d += ' C'+cp1x+','+coords[i][1]+' '+cp2x+','+coords[i+1][1]+' '+coords[i+1][0]+','+coords[i+1][1];
    }
    return d;
  }
  
  // Y-Achse Werte (3 Labels)
  const yLabels = [Math.ceil(minV), Math.round((minV+maxV)/2), Math.floor(maxV)];
  
  // Trenn-X (Jetzt)
  const nowX = padL + (pastPts.length-1)*step;
  
  svg.innerHTML = `
    <defs>
      <linearGradient id="pgPast" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2ea8ff" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#2ea8ff" stop-opacity=".03"/>
      </linearGradient>
      <linearGradient id="pgFuture" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffd23f" stop-opacity=".15"/>
        <stop offset="100%" stop-color="#ffd23f" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    <!-- Y-Achse -->
    ${yLabels.map(v => {
      const y = padT + (1-(v-minV)/range)*(h-padT-padB);
      return `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(255,255,255,.06)"/>
              <text x="${padL-4}" y="${y+4}" fill="rgba(255,255,255,.4)" font-size="9" text-anchor="end" font-family="system-ui">${v}</text>`;
    }).join('')}
    <!-- Trennlinie Jetzt -->
    <line x1="${nowX}" y1="${padT}" x2="${nowX}" y2="${h-padB}" stroke="rgba(255,215,0,.4)" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="${nowX+3}" y="${padT+10}" fill="rgba(255,215,0,.7)" font-size="9" font-family="system-ui">Jetzt</text>
    <text x="${padL-4}" y="${h-padB+14}" fill="rgba(255,255,255,.3)" font-size="9" text-anchor="end" font-family="system-ui">hPa</text>
    <!-- Labels -->
    <text x="${padL+20}" y="${h-4}" fill="rgba(255,255,255,.3)" font-size="9" font-family="system-ui">12h ago</text>
    <text x="${w-padR-10}" y="${h-4}" fill="rgba(255,215,0,.5)" font-size="9" text-anchor="end" font-family="system-ui">+12h</text>
    <!-- Vergangenheit Fläche -->
    <path d="M${pastCoords[0][0]},${h-padB} ${bezier(pastCoords).slice(1)} L${pastCoords[pastCoords.length-1][0]},${h-padB} Z" fill="url(#pgPast)"/>
    <!-- Zukunft Fläche -->
    <path d="M${futureCoords[0][0]},${h-padB} ${bezier(futureCoords).slice(1)} L${futureCoords[futureCoords.length-1][0]},${h-padB} Z" fill="url(#pgFuture)"/>
    <!-- Vergangenheit Linie (solide) -->
    <path d="${bezier(pastCoords)}" fill="none" stroke="#2ea8ff" stroke-width="2" stroke-linecap="round"/>
    <!-- Zukunft Linie (gestrichelt) -->
    <path d="${bezier(futureCoords)}" fill="none" stroke="#ffd23f" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4"/>
    <!-- Jetzt-Punkt -->
    <circle cx="${nowX}" cy="${pastCoords[pastCoords.length-1][1]}" r="5" fill="#ffd23f" stroke="#fff" stroke-width="1.5"/>
  `;
}

function addChartTouch(svgId, pts, color) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const w=900, h=200, pad=28;
  const step = (w-pad*2)/(pts.length-1);
  const mx = Math.max(...pts)||100;
  
  function showTooltip(clientX) {
    const rect = svg.getBoundingClientRect();
    const relX = (clientX - rect.left) / rect.width * w;
    const idx = Math.max(0, Math.min(pts.length-1, Math.round((relX-pad)/step)));
    const val = pts[idx];
    const px = pad + idx*step;
    const py = h - pad - (val/mx)*(h-pad*1.6);
    // Korrekte Uhrzeit: 24 Datenpunkte = 1 pro Stunde → idx = Stunde direkt
    const hour = pts.length > 8 ? idx : idx;
    const label = pts.length > 8
      ? `${String(hour).padStart(2,'0')}:00 Uhr – ${val}%`
      : `${['Mo','Di','Mi','Do','Fr','Sa','So'][idx]||'Tag '+(idx+1)} – ${val}%`;
    
    let tip = svg.querySelector('#chartTip');
    if (!tip) {
      tip = document.createElementNS('http://www.w3.org/2000/svg','g');
      tip.id = 'chartTip';
      svg.appendChild(tip);
    }
    // Box-Größe großzügig berechnen
    const bw = Math.max(120, label.length * 8 + 24);
    const bh = 32;
    const bx = Math.min(w - pad - bw - 4, Math.max(pad, px - bw/2));
    const by = py > h/2 ? py - bh - 10 : py + 10;
    tip.innerHTML = `
      <line x1="${px}" y1="${pad}" x2="${px}" y2="${h-pad}" stroke="${color}" stroke-width="1.5" stroke-dasharray="4 3" opacity=".7"/>
      <circle cx="${px}" cy="${py}" r="6" fill="${color}" stroke="#fff" stroke-width="2"/>
      <circle cx="${px}" cy="${py}" r="2.5" fill="#fff"/>
      <rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="8" fill="rgba(8,18,34,.95)" stroke="${color}" stroke-width="1.5"/>
      <text x="${bx+bw/2}" y="${by+bh/2+5}" fill="white" font-size="13" font-weight="900" text-anchor="middle" font-family="system-ui">${label}</text>`;
  }
  
  function removeTooltip() {
    const tip = svg.querySelector('#chartTip');
    if (tip) tip.innerHTML = '';
  }
  
  svg.addEventListener('mousemove', e => showTooltip(e.clientX));
  svg.addEventListener('mouseleave', removeTooltip);
  svg.addEventListener('touchstart', e => { e.preventDefault(); showTooltip(e.touches[0].clientX); }, {passive:false});
  svg.addEventListener('touchmove', e => { e.preventDefault(); showTooltip(e.touches[0].clientX); }, {passive:false});
  svg.addEventListener('touchend', () => setTimeout(removeTooltip, 1500));
  svg.style.cursor = 'crosshair';
}

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(om);
        om.setView([52.4821, 9.7832], 13);
        const ic = L.divIcon({ className:'', html:'<div style="background:#67d33f;border:3px solid #fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#000;box-shadow:0 2px 8px rgba(0,0,0,.5)">91%</div>', iconSize:[36,36], iconAnchor:[18,18] });
        L.marker([52.4821, 9.7832], {icon:ic}).addTo(om);
      }

        drawChart('weekChart', WEEK, '#2ea8ff', _todayIdx);
        addChartTouch('weekChart', WEEK, '#2ea8ff');

    // Fischart-spezifischer Score: Biologie dominiert über Wetter
const fishCurve = (() => {
  const d = fishData[selFish];
  if (!d) return DAY;
  const curve = d.curve; // 0-100: biologische Aktivitätskurve pro Stunde
  const now = new Date().getHours();

  return DAY.map((v, h) => {

        // Biologie direkt (0-100%) + Wettermodifikation
    const bioScore = curve[h]; // Direkte biologische Aktivität

    // Temperatur-Faktor
    const waterT = parseFloat(haStates['sensor.wassertemperatur_gewaesser']?.state || 13);
    const tempRange = d.temp || '12–20°C';
    const tMatch = tempRange.match(/(\d+)[^0-9]+(\d+)/);
    let tempFactor = 1.0;
    if (tMatch) {
      const lo = parseFloat(tMatch[1]), hi = parseFloat(tMatch[2]);
      if (waterT < lo - 5) tempFactor = 0.35;
      else if (waterT < lo - 2) tempFactor = 0.60;
      else if (waterT < lo) tempFactor = 0.80;

    return Math.round(Math.min(95, Math.max(3, final)));

let _spotMap    = null;

// ── Karte: alle echten Fangpositionen (Spots-Tab) ────────────────────────────
const FISH_COLORS = {
  Zander:'#2ea8ff',Hecht:'#67d33f',Barsch:'#ff9d18',Karpfen:'#ffd23f',
  Schleie:'#ff6b6b',Aal:'#a78bfa',Brasse:'#94a3b8',Rotauge:'#34d399',

function initCatchMap(catches, spots, fishFilter) {
  const mapEl = document.getElementById('spotMap');
  if (!mapEl) return;
  if (typeof L === 'undefined') {
    setTimeout(() => initCatchMap(catches, spots, fishFilter), 600);
    return;
  }
  if (_spotMap) { _spotMap.remove(); _spotMap = null; }

  _spotMap = L.map('spotMap', {
    center: [52.476, 9.800], zoom: 12,
    zoomControl: true, attributionControl: true, tap: true,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(_spotMap);

  const bounds = [];

  // Fang-Marker (farbig nach Fischart)
  (catches || []).forEach(function(c) {
    if (!c.lat || !c.lon) return;
    const col = FISH_COLORS[c.fish_type] || '#2ea8ff';
    const dt  = c.timestamp ? new Date(c.timestamp).toLocaleDateString('de-DE') : '';
    L.circleMarker([c.lat, c.lon], {
      radius: 7, color: col, fillColor: col,
      fillOpacity: 0.85, weight: 2, opacity: 1,
    }).addTo(_spotMap)
    .bindPopup(
      '<div style="min-width:140px">' +
      '<div style="font-size:14px;font-weight:900;color:' + col + '">' + (c.fish_type || 'Fisch') + '</div>' +
      (c.length_cm ? '<div style="font-size:12px">' + c.length_cm + ' cm' + (c.weight_kg ? ' · ' + c.weight_kg + ' kg' : '') + '</div>' : '') +
      (c.spot  ? '<div style="font-size:11px;color:rgba(255,255,255,.6)">📍 ' + c.spot  + '</div>' : '') +
      (c.bait  ? '<div style="font-size:11px;color:rgba(255,255,255,.6)">🎣 ' + c.bait  + '</div>' : '') +
      (dt      ? '<div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:3px">🕐 ' + dt + '</div>' : '') +
      '</div>'
    );
    bounds.push([c.lat, c.lon]);
  });

  // Hotspot-Kreise (nur wenn kein Fischart-Filter aktiv)
  if (!fishFilter) {
    (spots || []).forEach(function(s) {
      if (!s.lat || !s.lon || s.catches < 2) return;
      const intensity = Math.min(1, s.catches / 6);
      const hcol = intensity > 0.6 ? '#ff4444' : intensity > 0.3 ? '#ff9d18' : '#ffd23f';
      L.circle([s.lat, s.lon], {
        radius: 80 + s.catches * 30,
        color: hcol, fillColor: hcol,
        fillOpacity: 0.12, weight: 1, opacity: 0.4,
      }).addTo(_spotMap);
    });
  }

  // GPS-Button
  const gpsBtn = L.control({ position: 'topleft' });
  gpsBtn.onAdd = function() {
    const div = L.DomUtil.create('div', 'leaflet-bar');
    div.innerHTML = '<a href="#" style="font-size:18px;display:flex;align-items:center;justify-content:center;width:30px;height:30px;background:rgba(10,24,38,.9);color:#2ea8ff;border:1px solid rgba(46,168,255,.3)">📍</a>';
    div.onclick = function(e) { e.preventDefault(); locateUser(); };
    return div;
  };
  gpsBtn.addTo(_spotMap);

  // Karte auf Fänge zentrieren
  if (bounds.length === 1) {
    _spotMap.setView(bounds[0], 14);
  } else if (bounds.length > 1) {
    try { _spotMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 }); }
    catch(e) { _spotMap.setView(bounds[0], 12); }
  }
}

function locateUser() {
  if (!_spotMap) return;
  // Erst HA person-Entity versuchen (HA Companion App)
  const person = haStates['person.christian_rduch'] ||
    Object.values(haStates).find(s => s.entity_id?.startsWith('person.'));
  const lat = person?.attributes?.latitude;
  const lng = person?.attributes?.longitude;
  if (lat && lng) {
    if (_userMarker) _userMarker.remove();
    _userMarker = L.circleMarker([lat, lng], {
      radius: 10, fillColor: '#2ea8ff', color: '#fff',
      weight: 3, opacity: 1, fillOpacity: 0.9,
    }).addTo(_spotMap).bindPopup('📍 Dein Standort (HA)').openPopup();
    _spotMap.flyTo([lat, lng], 13, { animate: true, duration: 0.8 });
    return;
  }
  // Fallback: Browser GPS
  _spotMap.locate({ setView: true, maxZoom: 13 });
  _spotMap.once('locationfound', (e) => {
    if (_userMarker) _userMarker.remove();
    _userMarker = L.circleMarker(e.latlng, {
      radius: 10, fillColor: '#2ea8ff', color: '#fff',
      weight: 3, opacity: 1, fillOpacity: 0.9,
    }).addTo(_spotMap).bindPopup('📍 Dein Standort').openPopup();
  });
  _spotMap.once('locationerror', () => {
    const msg = document.createElement('div');
    msg.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,100,100,.9);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999';
    msg.textContent = '📍 Standort nicht verfügbar';
    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 3000);
  });
}

        <div style="font-size:16px;font-weight:900">📍 ${spot.n}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:2px">${spot.type} · Tiefe ${spot.depth}</div>
      </div>
      <div style="font-size:28px;font-weight:950;color:${sc3(spot.s)}">${spot.s}%</div>
    </div>
    <div style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px;color:rgba(255,255,255,.7);line-height:1.5">
      💡 ${spot.tip}
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.55)">🐟 <b style="color:rgba(255,255,255,.8)">${spot.fish}</b></div>
    <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">
      ${spot.s>=80?'⭐ Sehr gute Bedingungen heute':spot.s>=65?'✓ Gute Bedingungen heute':'~ Mittelmäßige Bedingungen'}
    </div>`;
}


// ── Custom Fisch-Dropdown ────────────────────────────────────────────────────

function openSpeciesSheet() {
  openFishSheet('selFish', function(f) { selFish = f; renderView(); }, selFish);
}
function openWizardSheet() {
  openFishSheet('_wizFish', function(f) {
    wizState.fish = f;
    wizState.turb = null; wizState.light = null; wizState.depth = null;
    wizState.stelle = null; wizState.jahreszeit = null; wizState.wetter = null;
    renderView();
  }, wizState.fish);
}

function openFishSheet(targetVar, onSelect, currentVal) {
  const getCurrent = () => currentVal || window[targetVar] || '';
  const GROUPS = [
    { label: '🎣 Raubfische', fish: ['Zander','Hecht','Barsch','Aal','Forelle'] },
    { label: '🌿 Friedfische', fish: ['Karpfen','Schleie','Brasse','Rotauge','Rotfeder'] },
    { label: '⚡ Sonderfälle', fish: ['Döbel','Rapfen'] },
  ];

  const overlay = document.createElement('div');
  overlay.className = 'fish-sheet-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const sheet = document.createElement('div');
  sheet.className = 'fish-sheet';
  sheet.innerHTML = `<div class="fish-sheet-handle"></div><div class="fish-sheet-title">Fischart wählen</div>`;

  GROUPS.forEach(g => {
    const grpEl = document.createElement('div');
    grpEl.className = 'fish-sheet-group';
    grpEl.textContent = g.label;
    sheet.appendChild(grpEl);

    g.fish.forEach(f => {
      const d = fishData[f] || {};
      const item = document.createElement('div');
      item.className = 'fish-sheet-item' + (f === getCurrent() ? ' active' : '');
      const svgIcon = (FISH_SVG && FISH_SVG[f]) || '';
      const sc4 = d.score >= 80 ? '#67d33f' : d.score >= 65 ? '#ffd23f' : '#ff9d18';
      item.innerHTML = `
        ${svgIcon}
        <div>
          <div class="fish-sheet-item-name">${f}</div>
          <div class="fish-sheet-item-type">${d.type==='raubfisch'?'Raubfisch':d.type==='sonderfall'?'Sonderfall':'Friedfisch'}</div>
        </div>
        <div class="fish-sheet-item-score" style="color:${sc4}">${d.score||'?'}%</div>`;
      item.onclick = () => {
        window[targetVar] = f;
        overlay.remove();
        onSelect(f);
      };
      sheet.appendChild(item);
    });
  });

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}


// ── Einflussfaktoren aus echten HA-Daten berechnen ──────────────────────────
function calcFactors() {
  const _wxf = getVerifiedWeather();
  const temp = _wxf.temperature || 12;
  const pressure = _wxf.pressure || 1015;
  const pressureTrend = parseFloat(findFTSensor('pressure_trend')?.state || 0);
  const windSpeed = _wxf.wind_speed || 10;
  const rain = _wxf.precipitation || 0;
  const waterT = parseFloat(haStates['sensor.wassertemperatur_gewaesser']?.state || 13);
  const moonPhase = haStates['sensor.moon']?.state || haStates['sensor.mondphase']?.state || '';
  const humidity = parseFloat(haStates['weather.home']?.attributes?.humidity || 70);

  // Wetter-Score: Temperatur + Regen + Bewölkung
  let wetterScore = 70;
  if (temp >= 10 && temp <= 20) wetterScore += 15;
  else if (temp >= 5 && temp < 10) wetterScore += 5;
  else if (temp < 5) wetterScore -= 15;
  else if (temp > 25) wetterScore -= 10;
  if (rain === 0) wetterScore += 5;
  else if (rain < 2) wetterScore += 3;
  else if (rain > 5) wetterScore -= 15;
  wetterScore = Math.min(99, Math.max(5, wetterScore));

  // Mondphasen-Score
  let mondScore = 50;
  const moonLow = moonPhase.toLowerCase();
  if (moonLow.includes('voll') || moonLow.includes('full')) mondScore = 95;
  else if (moonLow.includes('neu') || moonLow.includes('new')) mondScore = 88;
  else if (moonLow.includes('zunehm') || moonLow.includes('waxing')) mondScore = 75;
  else if (moonLow.includes('abnehm') || moonLow.includes('waning')) mondScore = 65;
  else {
    // Aus HA moon sensor (0-1 oder 0-100)
    const moonVal = parseFloat(haStates['sensor.moon']?.attributes?.moon_phase ||
                               haStates['sensor.mondphase']?.attributes?.illuminance || 0);
    if (moonVal > 0 && moonVal <= 1) mondScore = Math.round(50 + moonVal * 45);
    else if (moonVal > 1) mondScore = Math.min(99, Math.round(50 + moonVal * 0.45));
    else mondScore = 72; // Fallback
  }

  // Luftdruck-Score
  let druckScore = 70;
  if (pressure >= 1010 && pressure <= 1025) druckScore = 85;
  else if (pressure >= 1000 && pressure < 1010) druckScore = 65;
  else if (pressure < 1000) druckScore = 45;
  else if (pressure > 1025) druckScore = 75;
  if (pressureTrend > 2) druckScore += 8;   // steigend = gut
  else if (pressureTrend < -2) druckScore -= 10; // fallend = schlecht
  druckScore = Math.min(99, Math.max(5, druckScore));

  // Wind-Score
  let windScore = 80;
  if (windSpeed < 5) windScore = 88;
  else if (windSpeed < 15) windScore = 80;
  else if (windSpeed < 25) windScore = 60;
  else if (windSpeed < 35) windScore = 40;
  else windScore = 20;

  // Wassertemp-Score
  let wasserScore = 60;
  if (waterT >= 12 && waterT <= 18) wasserScore = 92;
  else if (waterT >= 8 && waterT < 12) wasserScore = 72;
  else if (waterT >= 18 && waterT <= 22) wasserScore = 80;
  else if (waterT < 8) wasserScore = 45;
  else if (waterT > 22) wasserScore = 55;

  return [
    ['🌦️', 'Wetter',      Math.round(wetterScore)],
    ['🌙', 'Mondphase',   Math.round(mondScore)],
    ['📊', 'Luftdruck',   Math.round(druckScore)],
    ['💨', 'Wind',        Math.round(windScore)],
    ['💧', 'Wassertemp.', Math.round(wasserScore)],
  ];
}

document.addEventListener('click', function(e) {

  const fcTab = e.target.closest('[data-fctab]');
  if (fcTab) {
    e.preventDefault();
    e.stopPropagation();
    currentFcTab = fcTab.dataset.fctab;
    currentView = 'forecast';
    buildNav();
    renderView();
    return;
  }

  // Dropdown: direkt via onclick Funktionen
});

async function init() {
  try {
    await connectHA();
  } catch(e) { console.warn('HA connect:', e); }
  try {
    buildNav();
  } catch(e) { console.error('buildNav:', e); }
  try {
    renderView();
  } catch(e) {
    document.getElementById('content').innerHTML = 
      '<div style="color:#ff6b6b;padding:20px;font-family:monospace">INIT FEHLER: ' + e.message + '</div>';
  }
  // Refresh HA states every 30s
  setInterval(async () => {
    await connectHA();
    renderView();
  }, 30000);
}

init();
