<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fishing Tracker Fanghistorie</title>
<style>
html,body{margin:0;min-height:100%;background:#071018;color:white;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.wrap{min-height:100vh;padding:12px;box-sizing:border-box;background:radial-gradient(circle at 100% 0%,rgba(0,140,255,.18),transparent 34%),linear-gradient(145deg,#081018,#030507)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.title{font-size:22px;font-weight:800}
.pill{font-size:12px;opacity:.8;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06)}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
select{width:100%;border:0;border-radius:14px;background:rgba(255,255,255,.07);color:white;padding:10px;outline:none}
option{color:black}
.entry{margin-bottom:10px;padding:14px;border-radius:20px;background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.035));box-shadow:inset 0 0 0 1px rgba(255,255,255,.035)}
.entry.good{box-shadow:inset 0 0 0 1px rgba(0,255,120,.12),0 0 18px rgba(0,255,120,.06)}
.entry.bad{box-shadow:inset 0 0 0 1px rgba(255,60,60,.12),0 0 18px rgba(255,60,60,.05)}
.top{display:flex;justify-content:space-between;gap:8px;align-items:center}
.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}
.good .badge{background:rgba(0,255,120,.15);color:#78ffb0}
.bad .badge{background:rgba(255,60,60,.15);color:#ff8c8c}
.main{font-size:18px;font-weight:800}
.sub{margin-top:8px;color:rgba(255,255,255,.72);font-size:14px;line-height:1.45}
.meta{margin-top:8px;color:rgba(255,255,255,.46);font-size:12px}
.empty{padding:18px;border-radius:20px;background:rgba(255,255,255,.055);color:rgba(255,255,255,.75)}
</style>
</head>
<body>
<div class="wrap">
<div class="header"><div class="title">📋 Fanghistorie</div><div class="pill" id="count">Lade…</div></div>
<div class="filters">
<select id="fish"><option value="">Alle Fischarten</option></select>
<select id="spot"><option value="">Alle Spots</option></select>
<select id="bait"><option value="">Alle Köder</option></select>
<select id="status"><option value="">Alle Sessions</option><option value="1">Nur Fang</option><option value="0">Nur kein Fang</option></select>
</div>
<div id="list"></div>
</div>
<script>
let data=[];
function uniq(arr){return[...new Set(arr.filter(Boolean))].sort();}
function fill(id,values){const el=document.getElementById(id);const first=el.options[0].outerHTML;el.innerHTML=first+values.map(v=>`<option value="${String(v).replaceAll('"','&quot;')}">${v}</option>`).join('');}
function filtered(){const f=document.getElementById('fish').value,s=document.getElementById('spot').value,b=document.getElementById('bait').value,st=document.getElementById('status').value;return data.filter(e=>(!f||e.fish_type===f)&&(!s||e.spot===s)&&(!b||e.bait===b)&&(!st||String(e.caught||0)===st));}
function fmtDate(v){try{return new Date(v).toLocaleString('de-DE',{dateStyle:'short',timeStyle:'short'});}catch{return v||"";}}
function render(){const rows=filtered().slice().reverse();document.getElementById('count').textContent=rows.length+" Einträge";const list=document.getElementById('list');if(!rows.length){list.innerHTML=`<div class="empty">Keine passenden Einträge gefunden.</div>`;return;}list.innerHTML=rows.map(e=>{const good=Number(e.caught||0)>=1;return `<div class="entry ${good?"good":"bad"}"><div class="top"><div class="main">${e.fish_type||"Fisch"} · ${e.spot||"-"}</div><div class="badge">${good?"FANG":"KEIN FANG"}</div></div><div class="sub">Köder: <b>${e.bait||"-"}</b> · Länge: <b>${e.length_cm||0} cm</b><br>Beißchance beim Speichern: <b>${e.chance||"-"} %</b></div><div class="meta">${fmtDate(e.timestamp)}</div></div>`;}).join('');}
fetch('/local/fishing_tracker_data.json?ts='+Date.now()).then(r=>r.json()).then(payload=>{data=payload.entries||[];fill('fish',uniq(data.map(e=>e.fish_type)));fill('spot',uniq(data.map(e=>e.spot)));fill('bait',uniq(data.map(e=>e.bait)));['fish','spot','bait','status'].forEach(id=>document.getElementById(id).addEventListener('change',render));render();}).catch(err=>{document.getElementById('count').textContent="Keine Daten";document.getElementById('list').innerHTML=`<div class="empty">Noch keine fishing_tracker_data.json gefunden. Nach dem nächsten Fang wird die Datei automatisch erstellt.</div>`;});
</script>
</body>
</html>
