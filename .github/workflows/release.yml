name: Create Release
on:
  push:
    branches:
      - main
    paths:
      - 'custom_components/fishing_tracker/manifest.json'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/fishing_tracker/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - run: |
          zip -r release.zip custom_components/ hacs.json README.md logo.png icon.png
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Fishing Tracker v${{ steps.version.outputs.version }}
          files: release.zip
